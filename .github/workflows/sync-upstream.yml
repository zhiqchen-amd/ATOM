name: Sync with upstream ROCm/ATOM   
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/ROCm/ATOM.git || true
          git fetch upstream main

      - name: Merge upstream/main into main
        run: |
          git checkout main
          git merge --no-ff upstream/main -m "chore: sync with upstream ROCm/ATOM"

      - name: Push to fork
        run: git push origin main
