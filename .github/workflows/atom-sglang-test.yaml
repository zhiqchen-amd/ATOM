name: ATOM SGLang Test

on:
  pull_request:
    branches: [main]  # Triggers on PRs targeting `main`
    types: [opened, synchronize, reopened, ready_for_review, labeled, closed]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'atom/plugin/vllm/**'
      - 'atom/mesh/**'
      - '.github/benchmark/models_atomesh.yaml'
      - '.github/scripts/atomesh/**'
      - '.github/workflows/atomesh-*.yaml'
      - '.github/workflows/atom-vllm-*.yaml'
      - '.github/benchmark/oot_models_accuracy.json'
      - 'LICENSE'
      - '.gitignore'
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') }}

env:
  ATOM_BASE_NIGHTLY_IMAGE: rocm/atom-dev:latest
  ATOM_PYTHON_TAG: "cp312"
  SGLANG_IMAGE_CACHE_KEEP: "3"
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/ATOM.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id || github.sha }}
  NIGHTLY_SGLANG_IMAGE_TAG: rocm/atom-dev:sglang-latest

jobs:
  # ---------- SGLANG CI path (pull_request only) ----------
  ci-gate:
    name: Check Heavy CI Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Check approval and label gate
        id: gate
        env:
          CI_GATE_LABELS: ci:full,ci:sglang
          CI_GATE_PATHS_IGNORE: |
            **/*.md
            docs/**
            atom/plugin/vllm/**
            atom/mesh/**
            .github/workflows/atomesh-*.yaml
            .github/scripts/atomesh_*.sh
            .github/dashboard/atomesh_*.html
            .github/workflows/atom-vllm-*.yaml
            .github/benchmark/oot_models_accuracy.json
            LICENSE
            .gitignore
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./.github/scripts/check_heavy_ci_gate.sh

  check-signal:
    if: ${{ needs.ci-gate.outputs.should_run == 'true' }}
    needs: [ci-gate]
    name: Check Pre Checkin Signal
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Wait for Pre Checkin workflow
        run: bash ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          CHECK_SIGNAL_EVENT_NAME: pull_request
          CHECK_SIGNAL_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          CHECK_SIGNAL_SHA: ${{ github.event.pull_request.head.sha }}

  download_aiter_wheel:
    if: ${{ needs.ci-gate.outputs.should_run == 'true' && needs.check-signal.result == 'success' }}
    needs: [ci-gate, check-signal]
    name: Download aiter wheel
    runs-on: ubuntu-latest
    outputs:
      aiter_artifact_id: ${{ steps.download.outputs.aiter_artifact_id }}
      aiter_wheel_name: ${{ steps.download.outputs.aiter_wheel_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prefer latest main aiter wheel manifest and fallback to artifact
        id: download
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/download_aiter_wheel.sh

      - name: Upload aiter wheel
        uses: actions/upload-artifact@v7
        with:
          name: aiter-whl
          path: aiter-whl/amd_aiter*.whl
          retention-days: 7

  atom-sglang-accuracy:
    needs: [ci-gate, check-signal, download_aiter_wheel]
    if: ${{ needs.ci-gate.outputs.should_run == 'true' && needs.check-signal.result == 'success' && needs.download_aiter_wheel.result == 'success' }}
    name: Accuracy (${{ matrix.model_name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_name: "DeepSeek-R1-FP8 TP4"
            model_path: "deepseek-ai/DeepSeek-R1-0528"
            extra_args: "--trust-remote-code --tensor-parallel-size 4 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache"
            env_vars: |
              SGLANG_DEFAULT_SERVER_ARGS=
              SGLANG_AITER_FP8_PREFILL_ATTN=0
              SGLANG_USE_AITER=1
              ATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1
              SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models
              SGLANG_ENABLE_TORCH_COMPILE=1
              TORCHINDUCTOR_COMPILE_THREADS=128
            accuracy_test_threshold: 0.91
            runner: atom-mi355-8gpu-vllm-sgl-ci
          - model_name: "DeepSeek-R1-FP4 TP4"
            model_path: "amd/DeepSeek-R1-0528-MXFP4-v2"
            extra_args: "--trust-remote-code --tensor-parallel-size 4 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache"
            env_vars: |
              SGLANG_DEFAULT_SERVER_ARGS=
              SGLANG_AITER_FP8_PREFILL_ATTN=0
              SGLANG_USE_AITER=1
              ATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1
              SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models
              SGLANG_ENABLE_TORCH_COMPILE=1
              TORCHINDUCTOR_COMPILE_THREADS=128
            accuracy_test_threshold: 0.91
            runner: atom-mi355-8gpu-vllm-sgl-ci
          - model_name: "Qwen3.5-35B-A3B-FP8 TP2"
            model_path: "Qwen/Qwen3.5-35B-A3B-FP8"
            extra_args: "--tensor-parallel-size 2 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache"
            env_vars: |
              SGLANG_DEFAULT_SERVER_ARGS=
              SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models
              ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0
            accuracy_test_threshold: 0.76
            runner: atom-mi355-8gpu-vllm-sgl-ci
          - model_name: "DeepSeek-V4-Pro TP8"
            model_path: "deepseek-ai/DeepSeek-V4-Pro"
            extra_args: "--trust-remote-code --tensor-parallel-size 8 --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.9 --swa-full-tokens-ratio 0.1 --max-running-requests 256 --page-size 256 --disable-radix-cache --disable-shared-experts-fusion --tool-call-parser deepseekv4 --reasoning-parser deepseek-v4"
            env_vars: |
              SGLANG_DEFAULT_SERVER_ARGS=
              AITER_BF16_FP8_MOE_BOUND=0
              ATOM_MOE_GU_ITLV=1
              SGLANG_DEFAULT_THINKING=1
              SGLANG_DSV4_REASONING_EFFORT=max
              SGLANG_USE_AITER=1
              SGLANG_DSV4_FP4_EXPERTS=true
              SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models
              TORCHINDUCTOR_COMPILE_THREADS=128
            lm_eval_num_fewshot: 5
            lm_eval_num_concurrent: 8
            accuracy_test_threshold: 0.94
            runner: atom-mi355-8gpu-vllm-sgl-ci
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      CONTAINER_NAME: atom_sglang_${{ strategy.job-index }}
      AITER_ARTIFACT_ID: ${{ needs.download_aiter_wheel.outputs.aiter_artifact_id }}

    steps:
      - name: Configure Docker client config path
        run: |
          # Self-hosted runners often have a small or full $HOME; buildx defaults to ~/.docker/buildx
          # and fails with "no space left on device" on .lock. Point DOCKER_CONFIG + BUILDKIT_TMPDIR
          # at the job workspace (typically a larger volume than /home).
          case "${{ matrix.runner }}" in
            atom-mi308-8gpu-plugins-benchmark|atom-mi355-8gpu.predownload)
              echo "DOCKER_CONFIG=${GITHUB_WORKSPACE}/.atom-docker-client" >> "$GITHUB_ENV"
              echo "BUILDKIT_TMPDIR=${GITHUB_WORKSPACE}/.buildkit-tmp" >> "$GITHUB_ENV"
              echo "Set DOCKER_CONFIG and BUILDKIT_TMPDIR under workspace."
              ;;
            *)
              echo "Runner ${{ matrix.runner }}: leave DOCKER_CONFIG unset (default ~/.docker)."
              ;;
          esac
      
      - name: Clean up containers and workspace
        if: contains(fromJSON('["atom-mi355-8gpu.predownload"]'), matrix.runner)
        run: |
          echo "=== Cleaning up containers on $(hostname) ==="
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run --rm -v "${GITHUB_WORKSPACE:-$PWD}":/workspace -w /workspace --privileged rocm/pytorch:latest bash -lc "ls -la /workspace/ && find /workspace -mindepth 1 -delete" || true

      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Ensure Docker client config directory
        if: contains(fromJSON('["atom-mi308-8gpu-plugins-benchmark","atom-mi355-8gpu.predownload"]'), matrix.runner)
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          chmod 700 "$DOCKER_CONFIG"
          mkdir -p "${BUILDKIT_TMPDIR}"
          chmod 700 "${BUILDKIT_TMPDIR}"

      - name: Resolve SGLang version metadata
        run: python3 .github/scripts/resolve_sglang_metadata.py

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> $GITHUB_ENV

      - name: Docker Login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Download aiter wheel
        uses: actions/download-artifact@v8
        with:
          name: aiter-whl
          path: aiter-whl

      - name: Generate SGLANG overlay Dockerfile
        run: |
          cat <<'EOF' > Dockerfile.mod
          ARG SGLANG_BASE_IMAGE
          FROM ${SGLANG_BASE_IMAGE}
          ARG GITHUB_REPO_URL
          ARG GITHUB_COMMIT_SHA
          ARG SGLANG_REF
          ARG AITER_ARTIFACT_ID
          ARG INSTALL_LM_EVAL=1
          LABEL com.rocm.atom.sglang_ref="${SGLANG_REF}"
          LABEL com.rocm.atom.aiter_artifact_id="${AITER_ARTIFACT_ID}"
          COPY aiter-whl/ /tmp/aiter-whl/
          RUN if [ "${INSTALL_LM_EVAL}" = "1" ]; then pip install -U "lm-eval[api]"; else echo "Skip lm-eval install"; fi
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true && \
              pip uninstall -y amd-aiter || true && \
              rm -rf /app/aiter-test && \
              AITER_WHL="$(ls -t /tmp/aiter-whl/amd_aiter*.whl 2>/dev/null | head -1)" && \
              if [ -z "${AITER_WHL}" ]; then echo "ERROR: No amd_aiter wheel found under /tmp/aiter-whl"; ls -la /tmp/aiter-whl || true; exit 1; fi && \
              pip install "${AITER_WHL}" && \
              echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true && \
              rm -rf /tmp/aiter-whl
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true && \
              pip uninstall -y atom || true && \
              rm -rf /app/ATOM && \
              git clone "${GITHUB_REPO_URL}" /app/ATOM && \
              cd /app/ATOM && \
              git checkout "${GITHUB_COMMIT_SHA}" && \
              pip install -e . --no-deps && \
              echo "=== ATOM version AFTER installation ===" && pip show atom || true
          RUN pip show amd-aiter atom sglang torch triton mori || true
          EOF

      - name: Build SGLANG image locally
        run: |
          set -euo pipefail
          docker rmi "atom_sglang_base:ci" || true
          docker rmi "atom_sglang:ci" || true

          BUILD_MODE="full"
          if ! docker pull "${NIGHTLY_SGLANG_IMAGE_TAG}"; then
            echo "Unable to pull ${NIGHTLY_SGLANG_IMAGE_TAG}; rebuilding SGLang locally."
          else
            echo "Inspecting ${NIGHTLY_SGLANG_IMAGE_TAG} labels before deciding whether to reuse it locally."
            docker inspect --format 'Image ID: {{.Id}}' "${NIGHTLY_SGLANG_IMAGE_TAG}" || true
            docker inspect --format 'Image labels: {{json .Config.Labels}}' "${NIGHTLY_SGLANG_IMAGE_TAG}" || true
            LATEST_SGLANG_REF="$(docker inspect --format '{{ index .Config.Labels "com.rocm.atom.sglang_ref" }}' "${NIGHTLY_SGLANG_IMAGE_TAG}" 2>/dev/null || true)"
            echo "Expected SGLang commit label: ${SGLANG_REF}"
            echo "Resolved ${NIGHTLY_SGLANG_IMAGE_TAG} label com.rocm.atom.sglang_ref: ${LATEST_SGLANG_REF:-<missing>}"
            if [ -n "${LATEST_SGLANG_REF}" ] && [ "${LATEST_SGLANG_REF}" = "${SGLANG_REF}" ]; then
              BUILD_MODE="fast"
              echo "Reusing ${NIGHTLY_SGLANG_IMAGE_TAG} locally for SGLANG CI."
            else
              echo "SGLANG CI latest image label mismatch or missing. Expected ${SGLANG_REF}, got ${LATEST_SGLANG_REF:-<missing>}; rebuilding SGLang locally."
            fi
          fi

          if [ "${BUILD_MODE}" = "fast" ]; then
            DOCKER_BUILDKIT=1 docker build --network=host \
              -t atom_sglang:ci \
              --build-arg SGLANG_BASE_IMAGE="${NIGHTLY_SGLANG_IMAGE_TAG}" \
              --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
              --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
              --build-arg SGLANG_REF="${SGLANG_REF}" \
              --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
              --build-arg INSTALL_LM_EVAL=1 \
              -f Dockerfile.mod .
            exit 0
          fi

          DOCKER_BUILDKIT=1 docker build --pull --network=host \
            --no-cache \
            -t atom_sglang_base:ci \
            --build-arg SGLANG_BASE_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GITHUB_REPO_URL="${GITHUB_REPO_URL}" \
            --build-arg GITHUB_COMMIT_SHA="${GITHUB_COMMIT_SHA}" \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg AITER_ARTIFACT_ID="${AITER_ARTIFACT_ID}" \
            --build-arg INSTALL_LM_EVAL=1 \
            -f Dockerfile.mod .

          DOCKER_BUILDKIT=1 docker build --network=host \
            --no-cache \
            -t atom_sglang:ci \
            --target atom_sglang \
            --build-arg SGLANG_BASE_IMAGE="atom_sglang_base:ci" \
            --build-arg MAX_JOBS=64 \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .

      - name: Set SGLANG image tag
        run: |
          echo "SGLANG_IMAGE_TAG=atom_sglang:ci" >> "$GITHUB_ENV"

      - name: Prepare model cache mount
        run: |
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models" ]; then
            MODEL_CACHE_MOUNT="-v /models:/models"
            MODEL_CACHE_DESC="/models (host mount)"
          elif [ -d "/it-share/models" ]; then
            MODEL_CACHE_MOUNT="-v /it-share/models:/models"
            MODEL_CACHE_DESC="/it-share/models (host path)"
          elif [ -d "/mnt/dcgpuval/models" ]; then
            MODEL_CACHE_MOUNT="-v /mnt/dcgpuval/models:/models"
            MODEL_CACHE_DESC="/mnt/dcgpuval/models (host path)"
          elif [ -d "/shareddata/models" ]; then
            MODEL_CACHE_MOUNT="-v /shareddata/models:/models"
            MODEL_CACHE_DESC="/shareddata/models (host path)"
          elif [ -d "/data/models" ]; then
            MODEL_CACHE_MOUNT="-v /data/models:/models"
            MODEL_CACHE_DESC="/data/models (host path)"
          else
            echo "Warning: /models and /it-share/models and /mnt/dcgpuval/models and /shareddata/models and /data/models directory not found on runner; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Start SGLANG test container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host --network=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --name "$CONTAINER_NAME" \
            "$SGLANG_IMAGE_TAG"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model if needed
        if: success()
        run: |
          set -euo pipefail
          model_dir="/models/${{ matrix.model_path }}"
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            model_use_lock="true"
            if [ "${{ matrix.runner }}" = "atom-mi355-8gpu.predownload" ]; then
              model_use_lock="false"
            fi
            echo "Using shared model download script for ${model_dir} (MODEL_USE_LOCK=${model_use_lock})"
            if ! docker exec \
              -e HF_TOKEN="${HF_TOKEN:-}" \
              -e MODEL_ID="${{ matrix.model_path }}" \
              -e TARGET_DIR="${model_dir}" \
              -e MODEL_USE_LOCK="${model_use_lock}" \
              -e MODEL_DOWNLOAD_TIMEOUT="${MODEL_DOWNLOAD_TIMEOUT}" \
              -e MODEL_LOCK_WAIT_SECONDS="${MODEL_LOCK_WAIT_SECONDS}" \
              -e MODEL_LOCK_POLL_INTERVAL="${MODEL_LOCK_POLL_INTERVAL}" \
              -e MODEL_PROGRESS_INTERVAL="${MODEL_PROGRESS_INTERVAL}" \
              "$CONTAINER_NAME" \
              bash -lc 'bash /workspace/.github/scripts/download_model_with_lock.sh "$MODEL_ID" "$TARGET_DIR"'; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          else
            echo "/models directory not mounted; skipping model download"
          fi
        env:
          MODEL_DOWNLOAD_TIMEOUT: "3h"
          MODEL_LOCK_WAIT_SECONDS: "7200"
          MODEL_LOCK_POLL_INTERVAL: "30"
          MODEL_PROGRESS_INTERVAL: "60"

      - name: Resolve SGLANG model path
        if: success()
        run: |
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            echo "SGLANG_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using mounted model path: /models/${{ matrix.model_path }}"
          else
            echo "SGLANG_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run SGLANG launch and gsm8k accuracy via script (ci mode)
        if: success()
        timeout-minutes: 120
        env:
          SGLANG_MODEL_NAME: ${{ matrix.model_name }}
          SGLANG_MODEL_PATH: ${{ matrix.model_path }}
          SGLANG_EXTRA_ARGS: ${{ matrix.extra_args }}
          SGLANG_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_SGLANG_LOGS: "1"
          LM_EVAL_TASK: "gsm8k"
          LM_EVAL_NUM_FEWSHOT: ${{ matrix.lm_eval_num_fewshot || '3' }}
          LM_EVAL_NUM_CONCURRENT: ${{ matrix.lm_eval_num_concurrent || '65' }}
        run: |
          docker exec \
            -e SGLANG_MODEL_NAME="${SGLANG_MODEL_NAME}" \
            -e SGLANG_MODEL_PATH="${SGLANG_RESOLVED_MODEL_PATH:-$SGLANG_MODEL_PATH}" \
            -e SGLANG_EXTRA_ARGS="${SGLANG_EXTRA_ARGS}" \
            -e SGLANG_ENV_VARS="${SGLANG_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_SGLANG_LOGS="${STREAM_SGLANG_LOGS}" \
            -e LM_EVAL_TASK="${LM_EVAL_TASK}" \
            -e LM_EVAL_NUM_FEWSHOT="${LM_EVAL_NUM_FEWSHOT}" \
            -e LM_EVAL_NUM_CONCURRENT="${LM_EVAL_NUM_CONCURRENT}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_sglang_test.sh accuracy
            "

      - name: Check SGLANG accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true
          result_file=$(ls -1t atom_sglang_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in atom_sglang_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(python3 - "$result_file" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              data = json.load(f)
          print(data["results"]["gsm8k"]["exact_match,flexible-extract"])
          PY
          )
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect SGLANG accuracy summary
        if: success()
        run: |
          echo "SGLANG Accuracy Test Summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/atom_sglang_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect SGLANG logs and results
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang.log ./atom_sglang.log || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_output.txt ./atom_sglang_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true

      - name: Upload SGLANG artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sglang-${{ matrix.model_name }}-artifacts
          path: |
            atom_sglang.log
            atom_sglang_accuracy_output.txt
            atom_sglang_accuracy_results

      - name: Clean up SGLANG test
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/atom_sglang.pid ]; then kill \$(cat /tmp/atom_sglang.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          rm -f Dockerfile.mod || true
          docker rmi "atom_sglang_base:ci" || true
          docker rmi "atom_sglang:ci" || true
