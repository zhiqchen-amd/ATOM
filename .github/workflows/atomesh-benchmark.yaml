name: Atomesh Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'atom/mesh/**'
      - '.github/benchmark/models_atomesh.yaml'
      - '.github/scripts/atomesh/**'
      - '.github/workflows/atomesh-benchmark.yaml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'atom/mesh/**'
      - '.github/benchmark/models_atomesh.yaml'
      - '.github/scripts/atomesh/**'
      - '.github/workflows/atomesh-benchmark.yaml'
  schedule:
    # TW weekend nightly at 21:00 Beijing time (13:00 UTC).
    - cron: '0 13 * * 6'
    - cron: '0 13 * * 0'
    # Spur nightly at 00:10 Beijing time (16:10 UTC).
    - cron: '10 16 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Benchmark suite'
        required: false
        default: nightly
        type: choice
        options:
          - smoke
          - nightly
      run_all_models:
        description: 'Run all models from models_atomesh.yaml'
        required: false
        default: true
        type: boolean
      model_names:
        description: 'Optional when run_all_models=false. Comma-separated: DeepSeek-V4-Pro,GLM-5.2-MXFP4,Kimi-K2.5-MXFP4,MiniMax-M3-MXFP4,MiniMax-M3-MXFP8'
        required: false
        default: ''
        type: string
      case_names:
        description: 'Overrides model_names. Comma-separated: ds-v4-1p1d-tp8-smoke,ds-v4-1p1d-tp8,ds-v4-1p1d-dpa-tp8,ds-v4-2p1d-dpa-tp8,glm-52-mxfp4-1p1d-tp4,glm-52-mxfp4-1p1d-tp8,kimi-k25-1p1d-tp4,kimi-k25-1p1d-tp4-tp8,kimi-k25-2p1d-tp4,kimi-k25-1p2d-tp4,minimax-m3-fp4-1p1d-tp4,minimax-m3-fp4-2p1d-dpa-tp4,minimax-m3-fp4-1p1d-tp4-eagle3,minimax-m3-fp4-2p1d-dpa-tp4-eagle3,minimax-m3-fp8-1p1d-tp4,minimax-m3-fp8-2p1d-dpa-tp4,minimax-m3-fp8-1p1d-tp4-eagle3,minimax-m3-fp8-2p1d-dpa-tp4-eagle3'
        required: false
        default: ''
        type: string
      atomesh_image:
        description: 'Override ATOM docker image'
        required: false
        default: rocm/atom-dev:latest
        type: string
      atomesh_slurm_submit_runner:
        description: 'GitHub runner label used to submit Slurm jobs: atomesh-cicd = TW MI355X, atomesh-cicd-mi350 = Spur MI350X'
        required: false
        default: atomesh-cicd
        type: choice
        options:
          - atomesh-cicd
          - atomesh-cicd-mi350
      atomesh_log_root:
        description: 'Root directory for ATOMesh Slurm logs'
        required: false
        default: ''
        type: string
      atomesh_1p1d_nodes:
        description: 'Optional comma-separated ATOMesh 1P1D nodes'
        required: false
        default: ''
        type: string
      atomesh_2p1d_nodes:
        description: 'Optional comma-separated ATOMesh 2P1D nodes'
        required: false
        default: ''
        type: string
      benchmark_concurrency:
        description: 'Optional benchmark concurrency override, e.g. 1,2,4 (no quotes)'
        required: false
        default: ''
        type: string
      eval_concurrency:
        description: 'Optional lm_eval concurrency override, e.g. 64 or 32,64 (no quotes)'
        required: false
        default: ''
        type: string
      run_model_benchmark:
        description: 'Run model Slurm benchmark for workflow_dispatch'
        required: false
        default: false
        type: boolean
      publish_dashboard:
        description: 'Publish workflow_dispatch results to the benchmark dashboard'
        required: false
        default: false
        type: boolean

env:
  ATOMESH_SLURM_ACCOUNT: ${{ (github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && '' || 'amd-frameworks' }}
  ATOMESH_SLURM_PARTITION: ${{ (github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && '' || 'amd-frameworks' }}
  ATOMESH_SLURM_SUBMIT_RUNNER: ${{ github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd') }}
  ATOMESH_DASHBOARD_HARDWARE: ${{ (github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && 'MI350X' || 'MI355X' }}
  ATOMESH_PD_RANK_MAPPING_POLICY: ${{ (github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && 'idx2idx' || 'none' }}
  ATOMESH_LOG_ROOT: ${{ github.event_name == 'workflow_dispatch' && inputs.atomesh_log_root != '' && inputs.atomesh_log_root || ((github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && '/data/${USER}/logs/ATOMESH_LOG/' || '/it-share/ATOMESH_LOG/') }}
  ATOMESH_MODEL_ROOT: ${{ (github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && '/data/models2' || '/mnt/models' }}
  ATOMESH_1P1D_NODES: ${{ github.event_name == 'workflow_dispatch' && inputs.atomesh_1p1d_nodes != '' && inputs.atomesh_1p1d_nodes || ((github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && 'ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-5,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-6,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-7,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-8,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16' || 'mia1-p02-g42,mia1-p02-g44') }}
  ATOMESH_2P1D_NODES: ${{ github.event_name == 'workflow_dispatch' && inputs.atomesh_2p1d_nodes != '' && inputs.atomesh_2p1d_nodes || ((github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd')) == 'atomesh-cicd-mi350' && 'ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-5,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-6,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-7,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-8,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16' || 'mia1-p02-g42,mia1-p02-g44,mia1-p02-g47') }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.atomesh_slurm_submit_runner || (github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'atomesh-cicd-mi350' || 'atomesh-cicd') }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: read
  contents: write

jobs:
  load-config:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    name: Load ATOMesh benchmark config
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      has_matrix: ${{ steps.matrix.outputs.has_matrix }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Install YAML parser
        run: python3 -m pip install pyyaml

      - name: Find ATOMesh latest nightly image
        id: image
        env:
          INPUT_ATOMESH_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.atomesh_image || '' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          import yaml

          cfg = yaml.safe_load(Path(".github/benchmark/models_atomesh.yaml").read_text(encoding="utf-8")) or {}
          default_image = str(cfg.get("backends", {}).get("atom", {}).get("image", "")).strip()
          image = os.environ.get("INPUT_ATOMESH_IMAGE", "").strip() or default_image

          def docker_tags(prefix: str) -> list[dict]:
              url = (
                  "https://hub.docker.com/v2/repositories/rocm/atom-dev/tags?"
                  + urllib.parse.urlencode({"page_size": 100, "name": prefix})
              )
              tags = []
              while url:
                  with urllib.request.urlopen(url, timeout=30) as response:
                      data = json.load(response)
                  tags.extend(
                      tag for tag in data.get("results", [])
                      if str(tag.get("name", "")).startswith(prefix)
                  )
                  url = data.get("next")
              return tags

          def latest_nightly_for(day) -> str | None:
              prefix = f"nightly_{day:%Y%m%d}"
              tags = docker_tags(prefix)
              if not tags:
                  return None
              tags.sort(
                  key=lambda tag: (str(tag.get("last_updated", "")), str(tag.get("name", ""))),
                  reverse=True,
              )
              return f"rocm/atom-dev:{tags[0]['name']}"

          def docker_tag_digest(tag_name: str) -> str:
              url = f"https://hub.docker.com/v2/repositories/rocm/atom-dev/tags/{urllib.parse.quote(tag_name)}"
              with urllib.request.urlopen(url, timeout=30) as response:
                  data = json.load(response)
              if data.get("digest"):
                  return str(data["digest"])
              for image_info in data.get("images", []):
                  if image_info.get("digest"):
                      return str(image_info["digest"])
              return ""

          resolved_image = image
          if image == "rocm/atom-dev:latest":
              beijing_tz = timezone(timedelta(hours=8))
              today = datetime.now(beijing_tz).date()
              resolved_image = latest_nightly_for(today)
              if resolved_image is None:
                  resolved_image = latest_nightly_for(today - timedelta(days=1))
              if resolved_image is None:
                  print("::warning::Cannot find rocm/atom-dev nightly tag for today or yesterday; falling back to rocm/atom-dev:latest.")
                  resolved_image = image

          image_digest = ""
          if resolved_image == "rocm/atom-dev:latest":
              image_digest = docker_tag_digest("latest")
              if image_digest:
                  print(f"ATOMesh image digest: {image_digest}")
              else:
                  print("::warning::Cannot resolve digest for rocm/atom-dev:latest.")

          print(f"ATOMesh image: {image} -> {resolved_image}")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"image={resolved_image}\n")
              output.write(f"image_digest={image_digest}\n")
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary and image_digest:
              with Path(step_summary).open("a", encoding="utf-8") as summary:
                  summary.write(f"ATOMesh image digest: `{image_digest}`\n")
          PY

      - name: Build benchmark matrix
        id: matrix
        env:
          SUITE: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && 'nightly' || (github.event_name == 'workflow_dispatch' && inputs.suite || 'smoke') }}
          RUN_ALL_MODELS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_all_models || github.event_name != 'workflow_dispatch' }}
          MODEL_NAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.model_names || '' }}
          CASE_NAMES: ${{ github.event_name == 'workflow_dispatch' && inputs.case_names || '' }}
          ATOMESH_IMAGE: ${{ steps.image.outputs.image }}
          ATOMESH_BENCHMARK_CONCURRENCY: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_concurrency || '' }}
          ATOMESH_EVAL_CONCURRENCY: ${{ github.event_name == 'workflow_dispatch' && inputs.eval_concurrency || '' }}
        run: |
          set -euo pipefail
          MODEL_NAME=""
          CASE_NAME=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${CASE_NAMES}" ]]; then
              CASE_NAME="${CASE_NAMES}"
            elif [[ "${RUN_ALL_MODELS}" != "true" ]]; then
              if [[ -z "${MODEL_NAMES}" ]]; then
                echo "::error::Set run_all_models=true, provide model_names, or provide case_names."
                exit 1
              fi
              MODEL_NAME="${MODEL_NAMES}"
            fi
          fi

          python3 .github/scripts/atomesh/pd_matrix.py \
            --suite "$SUITE" \
            ${MODEL_NAME:+--model "$MODEL_NAME"} \
            ${CASE_NAME:+--case "$CASE_NAME"} \
            ${ATOMESH_IMAGE:+--image "$ATOMESH_IMAGE"} \
            ${ATOMESH_BENCHMARK_CONCURRENCY:+--benchmark-concurrency "$ATOMESH_BENCHMARK_CONCURRENCY"} \
            ${ATOMESH_EVAL_CONCURRENCY:+--eval-concurrency "$ATOMESH_EVAL_CONCURRENCY"} \
            --output atomesh-matrix.json \
            --github-output
          cat atomesh-matrix.json

      - name: Validate ATOMesh P/D matrix
        if: ${{ steps.matrix.outputs.has_matrix == 'true' }}
        env:
          RESULT_DIR: atomesh-dry-run-results
        run: |
          set -euo pipefail
          chmod +x .github/scripts/atomesh/*.sh .github/scripts/atomesh/*.py
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          matrix = json.loads(Path("atomesh-matrix.json").read_text(encoding="utf-8"))
          for cell in matrix.get("include", []):
              print(f"Validating {cell['id']}", flush=True)
              subprocess.run(
                  [
                      "bash",
                      ".github/scripts/atomesh/pd_submit.sh",
                      "--cell-json",
                      json.dumps(cell, separators=(",", ":")),
                      "--result-dir",
                      os.environ["RESULT_DIR"],
                      "--dry-run",
                  ],
                  check=True,
              )
          PY

      - name: Upload expanded matrix
        uses: actions/upload-artifact@v7
        with:
          name: atomesh-benchmark-matrix
          path: atomesh-matrix.json

  run-model-benchmark:
    name: ${{ matrix.id }}
    needs: [load-config]
    if: >-
      needs.load-config.outputs.has_matrix == 'true'
      && (
        github.event_name == 'schedule'
        || (github.event_name == 'workflow_dispatch' && inputs.run_model_benchmark)
      )
    runs-on: ${{ matrix.runner.slurm_submit_runner }}
    timeout-minutes: 420
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-config.outputs.matrix_json) }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Print benchmark config
        env:
          CELL_JSON: ${{ toJson(matrix) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          cell = json.loads(os.environ["CELL_JSON"])

          def get(path, default=""):
              cur = cell
              for key in path.split("."):
                  if not isinstance(cur, dict) or key not in cur:
                      return default
                  cur = cur[key]
              return cur

          summary = {
              "id": get("id"),
              "suite": get("suite"),
              "model": get("model"),
              "case": get("name"),
              "image": get("image"),
              "model_path": get("model_path"),
              "precision": get("precision"),
              "runner": get("runner.slurm_submit_runner"),
              "slurm_account": get("runner.slurm_account"),
              "slurm_partition": get("runner.slurm_partition"),
              "log_root": get("runner.log_root"),
              "nodes": ",".join(get("nodes", [])),
              "num_nodes": get("num_nodes"),
              "topology": get("topology"),
              "pd_worker_layout": get("pd_worker_layout"),
              "prefill": get("service.prefill"),
              "decode": get("service.decode"),
              "router": get("service.router"),
              "server_args": get("server_args"),
              "isl": get("isl"),
              "osl": get("osl"),
              "concurrency": get("concurrency"),
              "run_eval": get("run_eval"),
          }

          print("=== ATOMesh benchmark config summary ===")
          for key, value in summary.items():
              print(f"{key}: {value}")

          print("=== ATOMesh benchmark full cell JSON ===")
          print(json.dumps(cell, indent=2, sort_keys=True))
          PY

      - name: Run Slurm benchmark cell
        env:
          CELL_JSON: ${{ toJson(matrix) }}
          RESULT_DIR: atomesh-results
          SLURM_SUBMIT_RUNNER: ${{ matrix.runner.slurm_submit_runner }}
        run: |
          set -euo pipefail
          ORIGINAL_WORKSPACE="${GITHUB_WORKSPACE}"
          if [[ "${SLURM_SUBMIT_RUNNER}" == "atomesh-cicd-mi350" ]]; then
            SHARED_WORKSPACE="/data/$(id -un)/atomesh-ci/${GITHUB_RUN_ID}/${{ matrix.id }}"
            rm -rf "${SHARED_WORKSPACE}"
            mkdir -p "${SHARED_WORKSPACE}"
            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete "${ORIGINAL_WORKSPACE}/" "${SHARED_WORKSPACE}/"
            else
              tar -C "${ORIGINAL_WORKSPACE}" -cf - . | tar -C "${SHARED_WORKSPACE}" -xf -
            fi
            cd "${SHARED_WORKSPACE}"
            RESULT_DIR="${ORIGINAL_WORKSPACE}/${RESULT_DIR}"
          fi
          chmod +x .github/scripts/atomesh/*.sh .github/scripts/atomesh/*.py
          SLURM_CANCEL_HELPER="${RESULT_DIR}/${{ matrix.id }}.slurm-cancel.sh"
          PD_SUBMIT_PID=""
          cleanup_slurm_from_wrapper() {
            local rc=$?
            trap - EXIT HUP INT TERM
            if [[ "${rc}" -ne 0 ]]; then
              echo "=== cancelling Slurm job from workflow wrapper rc=${rc} ==="
              if [[ -x "${SLURM_CANCEL_HELPER}" ]]; then
                bash "${SLURM_CANCEL_HELPER}" || true
              else
                echo "Slurm cancel helper is not available yet"
              fi
            fi
            if [[ -n "${PD_SUBMIT_PID}" ]] && kill -0 "${PD_SUBMIT_PID}" 2>/dev/null; then
              kill "${PD_SUBMIT_PID}" 2>/dev/null || true
              wait "${PD_SUBMIT_PID}" 2>/dev/null || true
            fi
            exit "${rc}"
          }
          trap cleanup_slurm_from_wrapper EXIT
          trap 'exit 129' HUP
          trap 'exit 130' INT
          trap 'exit 143' TERM
          bash .github/scripts/atomesh/pd_submit.sh \
            --cell-json "$CELL_JSON" \
            --result-dir "$RESULT_DIR" &
          PD_SUBMIT_PID=$!
          wait "${PD_SUBMIT_PID}"

      - name: Summarize ${{ matrix.id }} benchmark result
        if: always()
        env:
          MATRIX_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          mkdir -p atomesh-results
          SUMMARY_PATH="atomesh-results/${MATRIX_ID}-summary.md"
          BENCHMARK_ACTION_INPUT="atomesh-results/${MATRIX_ID}-benchmark-action.json"

          python3 .github/scripts/atomesh/process_result.py \
            "atomesh-results/${MATRIX_ID}" \
            --output "${BENCHMARK_ACTION_INPUT}" \
            --summary "${SUMMARY_PATH}" \
            --hardware "${ATOMESH_DASHBOARD_HARDWARE}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "## ${MATRIX_ID}"
            echo
            if [ -f "atomesh-results/${MATRIX_ID}.slurm-job-id" ]; then
              echo "Slurm job: $(cat "atomesh-results/${MATRIX_ID}.slurm-job-id")"
              echo
            fi
            cat "${SUMMARY_PATH}"
          } >> "$GITHUB_STEP_SUMMARY"

          cat "${SUMMARY_PATH}"

      - name: Upload model benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: atomesh-model-benchmark-${{ matrix.id }}
          path: |
            atomesh-results/
          if-no-files-found: ignore

  summarize-results:
    name: Summarize ATOMesh benchmark results
    needs: [run-model-benchmark]
    if: ${{ always() && !cancelled() && needs.run-model-benchmark.result != 'skipped' }}
    runs-on: ubuntu-latest
    outputs:
      has_results: ${{ steps.summary.outputs.has_results }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Download model benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: atomesh-model-benchmark-*
          merge-multiple: true
          path: atomesh-results

      - name: Build benchmark summary
        id: summary
        run: |
          set -euo pipefail
          mkdir -p atomesh-results
          python3 .github/scripts/atomesh/process_result.py \
            atomesh-results \
            --output atomesh-benchmark-action.json \
            --summary atomesh-benchmark-summary.md \
            --hardware "${ATOMESH_DASHBOARD_HARDWARE}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          cat atomesh-benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"
          ENTRY_COUNT="$(python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path("atomesh-benchmark-action.json")
          entries = json.loads(path.read_text(encoding="utf-8")) if path.is_file() else []
          print(len(entries))
          PY
          )"
          echo "entry_count=${ENTRY_COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "${ENTRY_COUNT}" -gt 0 ]]; then
            echo "has_results=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            echo "No successful ATOMesh benchmark result JSONs were produced; dashboard publish will be skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark summary
        if: ${{ steps.summary.outputs.has_results == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: atomesh-benchmark-summary
          path: |
            atomesh-benchmark-action.json
            atomesh-benchmark-summary.md

  dashboard:
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    name: Update ATOMesh Benchmark Dashboard
    needs: [summarize-results]
    if: >-
      !cancelled()
      && needs.summarize-results.result == 'success'
      && needs.summarize-results.outputs.has_results == 'true'
      && (
        github.event_name == 'schedule'
        || (github.event_name == 'workflow_dispatch' && inputs.publish_dashboard)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Download CI benchmark dashboard inputs
        uses: actions/download-artifact@v8
        with:
          name: atomesh-benchmark-summary
          path: atomesh-dashboard-input

      - name: Prepare ATOMesh dashboard assets
        run: |
          set -euo pipefail
          test -s atomesh-dashboard-input/atomesh-benchmark-action.json
          cp .github/dashboard/index.html /tmp/atomesh_dashboard_index.html

      - name: Store ATOMesh benchmark result to dashboard
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: atomesh-dashboard-input/atomesh-benchmark-action.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmark-dashboard
          auto-push: true
          max-items-in-chart: 300
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy ATOMesh dashboard shell to gh-pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages
          git checkout gh-pages
          git pull --ff-only origin gh-pages
          mkdir -p benchmark-dashboard

          cp /tmp/atomesh_dashboard_index.html benchmark-dashboard/index.html

          git add benchmark-dashboard/index.html
          git diff --cached --quiet || git commit -m "Update ATOMesh benchmark dashboard"
          git push origin gh-pages
