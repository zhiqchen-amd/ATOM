name: ATOM SGLang Accuracy Validation

on:
  schedule:
    # Nightly at 00:00 Beijing time (16:00 UTC on the previous day)
    - cron: '0 16 * * *'
  workflow_dispatch:
    # Manual runs use GitHub Actions' built-in branch dropdown ("Use workflow
    # from") as the ATOM branch selector, so users do not need to type branch
    # names.
    inputs:
      run_dsv4_prefix_cache_tp8:
        description: "DeepSeek-V4-Pro Prefix Cache TP8"
        required: false
        type: boolean
        default: false
      run_dsv32_fp8_tp4:
        description: "DeepSeek-V3.2-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_dsv32_fp8_tp4_dp4_ep4:
        description: "DeepSeek-V3.2-FP8 TP4 DP4 EP4"
        required: false
        type: boolean
        default: false
      run_dsv32_fp8_tp8:
        description: "DeepSeek-V3.2-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsv32_fp8_tp8_dp8_ep8:
        description: "DeepSeek-V3.2-FP8 TP8 DP8 EP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp4_online_quant:
        description: "DeepSeek-R1-FP8 TP4 Online Quant"
        required: false
        type: boolean
        default: false
      run_kimi_k26_mxfp4_tp4:
        description: "Kimi-K2.6-MXFP4 TP4"
        required: false
        type: boolean
        default: false
      run_kimi_k26_mxfp4_tp8:
        description: "Kimi-K2.6-MXFP4 TP8"
        required: false
        type: boolean
        default: false
      run_qwen35_35b_a3b_fp8_tp2:
        description: "Qwen3.5-35B-A3B-FP8 TP2"
        required: false
        type: boolean
        default: false
      run_qwen35_35b_a3b_tp2:
        description: "Qwen3.5-35B-A3B TP2"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_a17b_fp8_tp4:
        description: "Qwen3.5-397B-A17B-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_a17b_fp8_tp8:
        description: "Qwen3.5-397B-A17B-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp4:
        description: "DeepSeek-R1-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp8:
        description: "DeepSeek-R1-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp4:
        description: "DeepSeek-R1-FP4 TP4"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp4_dp4_ep4:
        description: "DeepSeek-R1-FP4 TP4 DP4 EP4"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8_dp8_ep8:
        description: "DeepSeek-R1-FP4 TP8 DP8 EP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8:
        description: "DeepSeek-R1-FP4 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8_mtp3:
        description: "DeepSeek-R1-FP4 TP8 MTP3"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8_mtp1:
        description: "DeepSeek-R1-FP4 TP8 MTP1"
        required: false
        type: boolean
        default: false
      run_glm51_fp8_tp8:
        description: "GLM-5.1-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_mi355_all:
        description: "Run all MI355 accuracy cases"
        required: false
        type: boolean
        default: false
      model_mi308:
        description: "Manual MI308 accuracy model selection"
        required: false
        type: choice
        default: none
        options:
          - none
          - all
          - MI308 Qwen3.5-397B-A17B-FP8 TP4
          - MI308 Qwen3.5-397B-A17B-FP8 TP8
          - MI308 Qwen3.5-35B-A3B-FP8 TP1
          - MI308 Qwen3-32B-FP8 TP1
          - MI308 Qwen3-32B-FP8 TP8
          - MI308 GLM-5.1-FP8 TP8
          - MI308 DeepSeek-V4-Flash
      rebuild_atom_base_from_dockerfile:
        description: "Full build image before validation"
        required: false
        type: boolean
        default: false
      upload_accuracy_to_dashboard:
        description: "Optional: upload SGLANG accuracy results to dashboard after this manual run"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ATOM_BASE_NIGHTLY_IMAGE: rocm/atom-dev:latest
  NIGHTLY_SGLANG_IMAGE_TAG: rocm/atom-dev:sglang-latest
  VALIDATION_IMAGE_REPO: rocm/atom-dev
  GPU_ARCH: "gfx942;gfx950"
  AITER_REPO: "https://github.com/ROCm/aiter.git"
  AITER_COMMIT: "HEAD"

jobs:
  # ---------- SGLANG full validation path (schedule / workflow_dispatch) ----------
  prepare-sglang-image:
    name: Prepare SGLANG validation image
    runs-on: build-only-atom
    outputs:
      sglang_image_tag: ${{ steps.meta.outputs.sglang_image_tag }}
      cleanup_temp_image: ${{ steps.meta.outputs.cleanup_temp_image }}
      model_matrix: ${{ steps.meta.outputs.model_matrix }}
      model_matrix_mi355: ${{ steps.meta.outputs.model_matrix_mi355 }}
      model_matrix_mi308: ${{ steps.meta.outputs.model_matrix_mi308 }}
      has_model_cells_mi355: ${{ steps.meta.outputs.has_model_cells_mi355 }}
      has_model_cells_mi308: ${{ steps.meta.outputs.has_model_cells_mi308 }}
    steps:
      - name: Checkout selected ATOM branch
        uses: actions/checkout@v6

      - name: Resolve SGLang version metadata
        run: python3 .github/scripts/resolve_sglang_metadata.py

      - name: Docker Login
        if: ${{ github.event_name == 'workflow_dispatch' && (github.ref_name != 'main' || inputs.rebuild_atom_base_from_dockerfile) }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Resolve image source and model matrix
        id: meta
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          RUN_DSV4_PREFIX_CACHE_TP8: ${{ inputs.run_dsv4_prefix_cache_tp8 }}
          RUN_DSR1_FP8_TP4: ${{ inputs.run_dsr1_fp8_tp4 }}
          RUN_DSV32_FP8_TP4: ${{ inputs.run_dsv32_fp8_tp4 }}
          RUN_DSV32_FP8_TP4_DP4_EP4: ${{ inputs.run_dsv32_fp8_tp4_dp4_ep4 }}
          RUN_DSV32_FP8_TP8_DP8_EP8: ${{ inputs.run_dsv32_fp8_tp8_dp8_ep8 }}
          RUN_DSR1_FP8_TP4_ONLINE_QUANT: ${{ inputs.run_dsr1_fp8_tp4_online_quant }}
          RUN_KIMI_K26_MXFP4_TP4: ${{ inputs.run_kimi_k26_mxfp4_tp4 }}
          RUN_KIMI_K26_MXFP4_TP8: ${{ inputs.run_kimi_k26_mxfp4_tp8 }}
          RUN_QWEN35_35B_A3B_FP8_TP2: ${{ inputs.run_qwen35_35b_a3b_fp8_tp2 }}
          RUN_QWEN35_35B_A3B_TP2: ${{ inputs.run_qwen35_35b_a3b_tp2 }}
          RUN_QWEN35_397B_A17B_FP8_TP4: ${{ inputs.run_qwen35_397b_a17b_fp8_tp4 }}
          RUN_QWEN35_397B_A17B_FP8_TP8: ${{ inputs.run_qwen35_397b_a17b_fp8_tp8 }}
          RUN_DSR1_FP8_TP8: ${{ inputs.run_dsr1_fp8_tp8 }}
          RUN_DSR1_FP4_TP4: ${{ inputs.run_dsr1_fp4_tp4 }}
          RUN_DSR1_FP4_TP4_DP4_EP4: ${{ inputs.run_dsr1_fp4_tp4_dp4_ep4 }}
          RUN_DSR1_FP4_TP8_DP8_EP8: ${{ inputs.run_dsr1_fp4_tp8_dp8_ep8 }}
          RUN_DSR1_FP4_TP8: ${{ inputs.run_dsr1_fp4_tp8 }}
          RUN_DSR1_FP4_TP8_MTP3: ${{ inputs.run_dsr1_fp4_tp8_mtp3 }}
          RUN_DSR1_FP4_TP8_MTP1: ${{ inputs.run_dsr1_fp4_tp8_mtp1 }}
          RUN_DSV32_FP8_TP8: ${{ inputs.run_dsv32_fp8_tp8 }}
          RUN_GLM51_FP8_TP8: ${{ inputs.run_glm51_fp8_tp8 }}
          RUN_MI355_ALL: ${{ inputs.run_mi355_all }}
          MODEL_MI308: ${{ inputs.model_mi308 || 'none' }}
          REBUILD_ATOM_BASE_FROM_DOCKERFILE: ${{ inputs.rebuild_atom_base_from_dockerfile }}
        run: |
          set -euo pipefail

          # Keep this Python model list as the single source of truth for SGLANG
          # full-validation coverage and manual checkbox filtering.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          event = os.environ["GITHUB_EVENT_NAME"]
          run_mi355_all = os.environ.get("RUN_MI355_ALL", "").lower() == "true"
          model_mi308 = os.environ.get("MODEL_MI308", "none")
          models = [
              {
                  "toggle_env": "RUN_DSV4_PREFIX_CACHE_TP8",
                  "model_name": "DeepSeek-V4-Pro Prefix Cache TP8",
                  "model_path": "deepseek-ai/DeepSeek-V4-Pro",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 8 --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --swa-full-tokens-ratio 0.1 --max-running-requests 256 --page-size 256 --enable-cache-report --disable-shared-experts-fusion --tool-call-parser deepseekv4 --reasoning-parser deepseek-v4",
                  "accuracy_test_threshold": 0.94,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nAITER_BF16_FP8_MOE_BOUND=0\nATOM_MOE_GU_ITLV=1\nSGLANG_DEFAULT_THINKING=1\nSGLANG_DSV4_REASONING_EFFORT=max\nSGLANG_USE_AITER=1\nSGLANG_DSV4_FP4_EXPERTS=true\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_DSR1_FP8_TP4",
                  "model_name": "DeepSeek-R1-FP8 TP4",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 4 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_DSV32_FP8_TP4",
                  "model_name": "DeepSeek-V3.2-FP8 TP4",
                  "model_path": "deepseek-ai/DeepSeek-V3.2",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 4 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_DSV32_FP8_TP4_DP4_EP4",
                  "model_name": "DeepSeek-V3.2-FP8 TP4 DP4 EP4",
                  "model_path": "deepseek-ai/DeepSeek-V3.2",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 4 --data-parallel-size 4 --expert-parallel-size 4 --enable-dp-attention --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nMORI_SHMEM_MODE=ISOLATION\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_DSV32_FP8_TP8_DP8_EP8",
                  "model_name": "DeepSeek-V3.2-FP8 TP8 DP8 EP8",
                  "model_path": "deepseek-ai/DeepSeek-V3.2",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 8 --data-parallel-size 8 --expert-parallel-size 8 --enable-dp-attention --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nMORI_SHMEM_MODE=ISOLATION\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_DSR1_FP8_TP4_ONLINE_QUANT",
                  "model_name": "DeepSeek-R1-FP8 TP4 Online Quant",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 4 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache --model-loader-extra-config '{\"online_quant_config\":{\"global_quant_config\":\"mxfp4\",\"exclude_layer\":[\"model.layers.*.self_attn.*\",\"model.layers.61.*\",\"lm_head\"]}}'",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_KIMI_K26_MXFP4_TP4",
                  "model_name": "Kimi-K2.6-MXFP4 TP4",
                  "model_path": "amd/Kimi-K2.6-MXFP4",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 4 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.8 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nAITER_QUICK_REDUCE_QUANTIZATION=INT4\nSGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_KIMI_K26_MXFP4_TP8",
                  "model_name": "Kimi-K2.6-MXFP4 TP8",
                  "model_path": "amd/Kimi-K2.6-MXFP4",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 8 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.8 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nAITER_QUICK_REDUCE_QUANTIZATION=INT4\nSGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN35_35B_A3B_FP8_TP2",
                  "model_name": "Qwen3.5-35B-A3B-FP8 TP2",
                  "model_path": "Qwen/Qwen3.5-35B-A3B-FP8",
                  "extra_args": "--tensor-parallel-size 2 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.76,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN35_35B_A3B_TP2",
                  "model_name": "Qwen3.5-35B-A3B TP2",
                  "model_path": "Qwen/Qwen3.5-35B-A3B",
                  "extra_args": "--tensor-parallel-size 2 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_A17B_FP8_TP4",
                  "model_name": "Qwen3.5-397B-A17B-FP8 TP4",
                  "model_path": "Qwen/Qwen3.5-397B-A17B-FP8",
                  "extra_args": "--tensor-parallel-size 4 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_A17B_FP8_TP8",
                  "model_name": "Qwen3.5-397B-A17B-FP8 TP8",
                  "model_path": "Qwen/Qwen3.5-397B-A17B-FP8",
                  "extra_args": "--tensor-parallel-size 8 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_DSR1_FP8_TP8",
                  "model_name": "DeepSeek-R1-FP8 TP8",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 8 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.85 --page-size 1 --disable-radix-cache",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
