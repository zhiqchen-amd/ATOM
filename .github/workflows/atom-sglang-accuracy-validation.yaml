                  "model_path": "Qwen/Qwen3.5-35B-A3B-FP8",
                  "extra_args": "--tensor-parallel-size 1 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.76,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-mi308-8gpu-plugins-benchmark",
              },
              {
                  "model_name": "MI308 Qwen3-32B-FP8 TP1",
                  "model_path": "Qwen/Qwen3-32B-FP8",
                  "extra_args": "--tensor-parallel-size 1 --page-size 16 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.8,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-mi308-8gpu-plugins-benchmark",
              },
              {
                  "model_name": "MI308 Qwen3-32B-FP8 TP8",
                  "model_path": "Qwen/Qwen3-32B-FP8",
                  "extra_args": "--tensor-parallel-size 8 --page-size 16 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.8,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "atom-mi308-8gpu-plugins-benchmark",
              },
              {
                  "model_name": "MI308 GLM-5.1-FP8 TP8",
                  "model_path": "zai-org/GLM-5.1-FP8",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 8 --attention-backend aiter --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.8 --page-size 1 --disable-radix-cache",
                  "lm_eval_num_fewshot": 20,
                  "lm_eval_num_concurrent": 64,
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=1\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-mi308-8gpu-plugins-benchmark",
              },
              {
                  "model_name": "MI308 DeepSeek-V4-Flash",
                  "model_path": "deepseek-ai/DeepSeek-V4-Flash",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 8 --kv-cache-dtype fp8_e4m3 --mem-fraction-static 0.9 --swa-full-tokens-ratio 0.1 --max-running-requests 256 --page-size 256 --disable-radix-cache --disable-shared-experts-fusion --tool-call-parser deepseekv4 --reasoning-parser deepseek-v4",
                  "lm_eval_num_fewshot": 5,
                  "lm_eval_num_concurrent": 8,
                  "accuracy_test_threshold": 0.94,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nAITER_BF16_FP8_MOE_BOUND=0\nATOM_MOE_GU_ITLV=1\nSGLANG_DEFAULT_THINKING=1\nSGLANG_DSV4_REASONING_EFFORT=max\nSGLANG_USE_AITER=1\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nTORCHINDUCTOR_COMPILE_THREADS=128",
                  "runner": "atom-mi308-8gpu-plugins-benchmark",
              },
          ]
          models.extend(mi308_models)

          selected = []
          for model in models:
              toggle = model.get("toggle_env")
              if toggle is None:
                  # MI308-only rows: all cases on nightly schedule; manual runs select one case or all cases.
                  enabled = (
                      event != "workflow_dispatch"
                      or model_mi308 == "all"
                      or model["model_name"] == model_mi308
                  )
              else:
                  enabled = event != "workflow_dispatch" or run_mi355_all or os.environ.get(toggle, "").lower() == "true"
              if enabled:
                  selected.append({k: v for k, v in model.items() if k != "toggle_env"})

          if event == "workflow_dispatch" and not selected:
              print("No models selected for manual run.", file=sys.stderr)
              sys.exit(1)

          def is_mi308_row(row):
              return "mi308" in str(row.get("runner", ""))

          sel355 = [r for r in selected if not is_mi308_row(r)]
          sel308 = [r for r in selected if is_mi308_row(r)]
          sep = (",", ":")
          full = json.dumps({"include": selected}, separators=sep)
          j355 = json.dumps({"include": sel355}, separators=sep)
          j308 = json.dumps({"include": sel308}, separators=sep)

          print(f"model_matrix={full}")
          print(f"model_matrix_mi355={j355}")
          print(f"model_matrix_mi308={j308}")
          print("has_model_cells_mi355=" + ("true" if sel355 else "false"))
          print("has_model_cells_mi308=" + ("true" if sel308 else "false"))
          PY

          REBUILD_FROM_DOCKERFILE="${REBUILD_ATOM_BASE_FROM_DOCKERFILE:-false}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${REBUILD_FROM_DOCKERFILE}" = "true" ]; then
              echo "Manual run selected full ATOM base rebuild from docker/Dockerfile"
            elif [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "Manual run on main reuses published SGLANG image"
            else
              echo "Manual run selected fast overlay rebuild from ${ATOM_BASE_NIGHTLY_IMAGE}"
            fi
          fi

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] || { [ "${GITHUB_REF_NAME}" = "main" ] && [ "${REBUILD_FROM_DOCKERFILE}" != "true" ]; }; then
            if RESOLUTION_JSON="$(
              python3 .github/scripts/resolve_atom_image.py \
                --repository "${VALIDATION_IMAGE_REPO}" \
                --reference-tag sglang-latest \
                --preferred-version "${SGLANG_REF#v}"
            )"; then
              RESOLVED_SGLANG_IMAGE="$(
                RESOLUTION_JSON="${RESOLUTION_JSON}" python3 - <<'PY'
          import json
          import os

          resolution = json.loads(os.environ["RESOLUTION_JSON"])
          print(resolution["resolved_image"])
          PY
              )"
            else
              echo "::warning::Failed to resolve ${NIGHTLY_SGLANG_IMAGE_TAG} to an immutable reference; falling back to the floating tag."
              RESOLVED_SGLANG_IMAGE="${NIGHTLY_SGLANG_IMAGE_TAG}"
            fi
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Manual run on main reuses published SGLANG image: ${RESOLVED_SGLANG_IMAGE}"
            else
              echo "Scheduled run uses published SGLANG image: ${RESOLVED_SGLANG_IMAGE}"
            fi
            echo "sglang_image_tag=${RESOLVED_SGLANG_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "cleanup_temp_image=false" >> "$GITHUB_OUTPUT"
            echo "manual_base_image_tag=" >> "$GITHUB_OUTPUT"
            echo "rebuilt_atom_base_image_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          MANUAL_BASE_IMAGE_TAG="atom_sglang_manual_base:${GITHUB_RUN_ID}-${SHORT_SHA}"
          REBUILT_ATOM_BASE_IMAGE_TAG="atom_sglang_rebuilt_base:${GITHUB_RUN_ID}-${SHORT_SHA}"
          SGLANG_IMAGE_TAG="${VALIDATION_IMAGE_REPO}:sglang-full-manual-${GITHUB_RUN_ID}-${SHORT_SHA}"
          BUILD_CONTEXT="$(mktemp -d)"
          trap 'rm -rf "${BUILD_CONTEXT}"' EXIT

          echo "sglang_image_tag=${SGLANG_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "cleanup_temp_image=true" >> "$GITHUB_OUTPUT"
          if [ "${REBUILD_FROM_DOCKERFILE}" = "true" ]; then
            echo "manual_base_image_tag=" >> "$GITHUB_OUTPUT"
            echo "rebuilt_atom_base_image_tag=${REBUILT_ATOM_BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "manual_base_image_tag=${MANUAL_BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "rebuilt_atom_base_image_tag=" >> "$GITHUB_OUTPUT"
          fi

          git archive --format=tar HEAD | tar -xf - -C "${BUILD_CONTEXT}"

          if [ "${REBUILD_FROM_DOCKERFILE}" = "true" ]; then
            echo "Manual run rebuilds ATOM base and SGLANG image from branch ${GITHUB_REF_NAME}"

            DOCKER_BUILDKIT=1 docker build --pull --network=host --no-cache \
              -t "${REBUILT_ATOM_BASE_IMAGE_TAG}" \
              --target atom_image \
              --build-arg GPU_ARCH="${GPU_ARCH}" \
              --build-arg AITER_REPO="${AITER_REPO}" \
              --build-arg AITER_COMMIT="${AITER_COMMIT}" \
              --build-arg MAX_JOBS=64 \
              --build-arg ATOM_REPO="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" \
              --build-arg ATOM_COMMIT="${GITHUB_SHA}" \
              -f "${BUILD_CONTEXT}/docker/Dockerfile" \
              "${BUILD_CONTEXT}"

            DOCKER_BUILDKIT=1 docker build --network=host --no-cache \
              -t "${SGLANG_IMAGE_TAG}" \
              --target atom_sglang \
              --build-arg SGLANG_BASE_IMAGE="${REBUILT_ATOM_BASE_IMAGE_TAG}" \
              --build-arg MAX_JOBS=64 \
              --build-arg SGLANG_REF="${SGLANG_REF}" \
              --build-arg INSTALL_LM_EVAL=1 \
              --build-arg INSTALL_FASTSAFETENSORS=1 \
              -f "${BUILD_CONTEXT}/docker/Dockerfile" \
              "${BUILD_CONTEXT}"

            docker push "${SGLANG_IMAGE_TAG}"
            exit 0
          fi

          cat <<'EOF' > "${BUILD_CONTEXT}/Dockerfile.mod"
          ARG ATOM_BASE_NIGHTLY_IMAGE
          FROM ${ATOM_BASE_NIGHTLY_IMAGE}
          ARG GPU_ARCH
          ARG AITER_REPO
          ARG AITER_COMMIT
          RUN pip install -U lm-eval[api]
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true
          RUN pip uninstall -y amd-aiter
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN rm -rf /app/aiter-test
          RUN git clone --depth 1 "${AITER_REPO}" /app/aiter-test && \
              cd /app/aiter-test && \
              git checkout "${AITER_COMMIT}" && \
              git submodule sync && git submodule update --init --recursive && \
              MAX_JOBS=64 PREBUILD_KERNELS=0 GPU_ARCHS="${GPU_ARCH}" python3 setup.py develop
          RUN echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true
          RUN pip uninstall -y atom
          RUN rm -rf /app/ATOM
          COPY . /app/ATOM
          RUN cd /app/ATOM && pip install -e .
          RUN echo "=== ATOM version AFTER installation ===" && pip show atom || true
          EOF

          echo "Building manual SGLANG image from branch ${GITHUB_REF_NAME}"

          docker build --pull --network=host --no-cache \
            -t "${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg ATOM_BASE_NIGHTLY_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GPU_ARCH="${GPU_ARCH}" \
            --build-arg AITER_REPO="${AITER_REPO}" \
            --build-arg AITER_COMMIT="${AITER_COMMIT}" \
            -f "${BUILD_CONTEXT}/Dockerfile.mod" \
            "${BUILD_CONTEXT}"

          docker build --network=host --no-cache \
            -t "${SGLANG_IMAGE_TAG}" \
            --target atom_sglang \
            --build-arg SGLANG_BASE_IMAGE="${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg MAX_JOBS=64 \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f "${BUILD_CONTEXT}/docker/Dockerfile" \
            "${BUILD_CONTEXT}"

          docker push "${SGLANG_IMAGE_TAG}"

      - name: Clean up builder images
        if: ${{ always() && steps.meta.outputs.cleanup_temp_image == 'true' }}
        run: |
          for image in \
            "${{ steps.meta.outputs.sglang_image_tag }}" \
            "${{ steps.meta.outputs.manual_base_image_tag }}" \
            "${{ steps.meta.outputs.rebuilt_atom_base_image_tag }}"; do
            if [ -n "${image}" ]; then
              docker rmi "${image}" || true
            fi
          done

  sglang-model-accuracy-mi355:
    name: SGLANG Model Accuracy (MI355 / non-MI308 runners)
    needs: [prepare-sglang-image]
    if: >-
      always()
      && needs.prepare-sglang-image.result == 'success'
      && needs.prepare-sglang-image.outputs.has_model_cells_mi355 == 'true'
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/atom-sglang-accuracy-validation-gpu-shard.yaml
    secrets: inherit
    with:
      shard_suffix: mi355
      model_matrix_json: ${{ needs.prepare-sglang-image.outputs.model_matrix_mi355 }}
      sglang_image_tag: ${{ needs.prepare-sglang-image.outputs.sglang_image_tag }}
      upload_accuracy_artifact: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.upload_accuracy_to_dashboard) }}

  sglang-model-accuracy-mi308:
    name: SGLANG Model Accuracy (MI308 runners)
    needs: [prepare-sglang-image]
    if: >-
      always()
      && needs.prepare-sglang-image.result == 'success'
      && needs.prepare-sglang-image.outputs.has_model_cells_mi308 == 'true'
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/atom-sglang-accuracy-validation-gpu-shard.yaml
    secrets: inherit
    with:
      shard_suffix: mi308
      model_matrix_json: ${{ needs.prepare-sglang-image.outputs.model_matrix_mi308 }}
      sglang_image_tag: ${{ needs.prepare-sglang-image.outputs.sglang_image_tag }}
      upload_accuracy_artifact: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.upload_accuracy_to_dashboard) }}

  accuracy-dashboard:
    name: Update SGLANG accuracy dashboard
    needs: [sglang-model-accuracy-mi355, sglang-model-accuracy-mi308]
    if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.upload_accuracy_to_dashboard)) }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Prepare accuracy artifact directory
        run: mkdir -p /tmp/accuracy-results

      - name: Download accuracy artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/accuracy-results
          pattern: accuracy-*
        continue-on-error: true

      - name: Count downloaded accuracy artifacts
        id: downloaded
        run: |
          json_count=$(find /tmp/accuracy-results -type f -name '*.json' | wc -l | tr -d ' ')
          echo "json_count=${json_count}" >> "$GITHUB_OUTPUT"
          echo "Downloaded ${json_count} SGLANG accuracy JSON files"

      - name: List downloaded accuracy artifacts
        if: steps.downloaded.outputs.json_count != '0'
        run: |
          echo "=== Downloaded SGLANG accuracy artifacts ==="
          find /tmp/accuracy-results -type f -name '*.json' | head -20 || echo "No JSON files found"

      - name: Transform SGLANG accuracy results for dashboard
        id: transform
        if: steps.downloaded.outputs.json_count != '0'
        run: |
          python3 .github/scripts/accuracy_to_dashboard.py \
            /tmp/accuracy-results \
            --output accuracy-benchmark-input.json \
            --models .github/benchmark/sglang_models_accuracy.json \
            --backend "ATOM-SGLang" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=== Generated entries ==="
          cat accuracy-benchmark-input.json
          entries_count=$(python3 -c "import json; data=json.load(open('accuracy-benchmark-input.json')); print(len(data))")
          echo "entries_count=${entries_count}" >> "$GITHUB_OUTPUT"
          if [ "${entries_count}" = "0" ]; then
            echo "::warning::No valid SGLANG accuracy entries were produced. Check that the result JSON files contain 'results.gsm8k[\"exact_match,flexible-extract\"]'."
          fi

      - name: Store SGLANG accuracy result to dashboard
        if: steps.transform.outputs.entries_count != '0' && steps.transform.outputs.entries_count != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: accuracy-benchmark-input.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmark-dashboard
          auto-push: true
          max-items-in-chart: 300
          github-token: ${{ secrets.GITHUB_TOKEN }}
