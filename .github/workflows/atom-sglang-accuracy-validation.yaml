name: ATOM SGLang Accuracy Validation

on:
  schedule:
    # Nightly at 02:00 Beijing time (18:00 UTC on the previous day)
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Manual runs use GitHub Actions' built-in branch dropdown ("Use workflow
    # from") as the ATOM branch selector, so users do not need to type branch
    # names.
    inputs:
      run_dsr1_fp8_tp4:
        description: "DeepSeek-R1-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_qwen35_35b_a3b_fp8_tp2:
        description: "Qwen3.5-35B-A3B-FP8 TP2"
        required: false
        type: boolean
        default: false
      run_qwen35_35b_a3b_tp2:
        description: "Qwen3.5-35B-A3B TP2"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_a17b_fp8_tp4:
        description: "Qwen3.5-397B-A17B-FP8 TP4"
        required: false
        type: boolean
        default: false
      run_qwen35_397b_a17b_fp8_tp8:
        description: "Qwen3.5-397B-A17B-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp8_tp8:
        description: "DeepSeek-R1-FP8 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp4:
        description: "DeepSeek-R1-FP4 TP4"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp4_dp4_ep4:
        description: "DeepSeek-R1-FP4 TP4 DP4 EP4"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8:
        description: "DeepSeek-R1-FP4 TP8"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8_mtp3:
        description: "DeepSeek-R1-FP4 TP8 MTP3"
        required: false
        type: boolean
        default: false
      run_dsr1_fp4_tp8_mtp1:
        description: "DeepSeek-R1-FP4 TP8 MTP1"
        required: false
        type: boolean
        default: false
      upload_accuracy_to_dashboard:
        description: "Optional: upload SGLANG accuracy results to dashboard after this manual run"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ATOM_BASE_NIGHTLY_IMAGE: rocm/atom-dev:latest
  NIGHTLY_SGLANG_IMAGE_TAG: rocm/atom-dev:sglang-latest
  VALIDATION_IMAGE_REPO: rocm/atom-dev
  GPU_ARCH: "gfx942;gfx950"
  AITER_REPO: "https://github.com/ROCm/aiter.git"
  AITER_COMMIT: "HEAD"
  SGLANG_REF: "v0.5.10"

jobs:
  # ---------- SGLANG full validation path (schedule / workflow_dispatch) ----------
  prepare-sglang-image:
    name: Prepare SGLANG validation image
    runs-on: build-only-atom
    outputs:
      sglang_image_tag: ${{ steps.meta.outputs.sglang_image_tag }}
      cleanup_temp_image: ${{ steps.meta.outputs.cleanup_temp_image }}
      model_matrix: ${{ steps.meta.outputs.model_matrix }}
    steps:
      - name: Checkout selected ATOM branch
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name != 'main' }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Resolve image source and model matrix
        id: meta
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          RUN_DSR1_FP8_TP4: ${{ inputs.run_dsr1_fp8_tp4 }}
          RUN_QWEN35_35B_A3B_FP8_TP2: ${{ inputs.run_qwen35_35b_a3b_fp8_tp2 }}
          RUN_QWEN35_35B_A3B_TP2: ${{ inputs.run_qwen35_35b_a3b_tp2 }}
          RUN_QWEN35_397B_A17B_FP8_TP4: ${{ inputs.run_qwen35_397b_a17b_fp8_tp4 }}
          RUN_QWEN35_397B_A17B_FP8_TP8: ${{ inputs.run_qwen35_397b_a17b_fp8_tp8 }}
          RUN_DSR1_FP8_TP8: ${{ inputs.run_dsr1_fp8_tp8 }}
          RUN_DSR1_FP4_TP4: ${{ inputs.run_dsr1_fp4_tp4 }}
          RUN_DSR1_FP4_TP4_DP4_EP4: ${{ inputs.run_dsr1_fp4_tp4_dp4_ep4 }}
          RUN_DSR1_FP4_TP8: ${{ inputs.run_dsr1_fp4_tp8 }}
          RUN_DSR1_FP4_TP8_MTP3: ${{ inputs.run_dsr1_fp4_tp8_mtp3 }}
          RUN_DSR1_FP4_TP8_MTP1: ${{ inputs.run_dsr1_fp4_tp8_mtp1 }}
        run: |
          set -euo pipefail

          # Keep this Python model list as the single source of truth for SGLANG
          # full-validation coverage and manual checkbox filtering.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          event = os.environ["GITHUB_EVENT_NAME"]
          models = [
              {
                  "toggle_env": "RUN_DSR1_FP8_TP4",
                  "model_name": "DeepSeek-R1-FP8 TP4",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--tensor-parallel-size 4",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-4",
              },
              {
                  "toggle_env": "RUN_QWEN35_35B_A3B_FP8_TP2",
                  "model_name": "Qwen3.5-35B-A3B-FP8 TP2",
                  "model_path": "Qwen/Qwen3.5-35B-A3B-FP8",
                  "extra_args": "--tensor-parallel-size 2 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.76,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "linux-atom-mi35x-4",
              },
              {
                  "toggle_env": "RUN_QWEN35_35B_A3B_TP2",
                  "model_name": "Qwen3.5-35B-A3B TP2",
                  "model_path": "Qwen/Qwen3.5-35B-A3B",
                  "extra_args": "--tensor-parallel-size 2 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "linux-atom-mi35x-4",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_A17B_FP8_TP4",
                  "model_name": "Qwen3.5-397B-A17B-FP8 TP4",
                  "model_path": "Qwen/Qwen3.5-397B-A17B-FP8",
                  "extra_args": "--tensor-parallel-size 4 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "linux-atom-mi35x-4",
              },
              {
                  "toggle_env": "RUN_QWEN35_397B_A17B_FP8_TP8",
                  "model_name": "Qwen3.5-397B-A17B-FP8 TP8",
                  "model_path": "Qwen/Qwen3.5-397B-A17B-FP8",
                  "extra_args": "--tensor-parallel-size 8 --mem-fraction-static 0.9 --reasoning-parser qwen3 --disable-radix-cache",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP8_TP8",
                  "model_name": "DeepSeek-R1-FP8 TP8",
                  "model_path": "deepseek-ai/DeepSeek-R1-0528",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP4",
                  "model_name": "DeepSeek-R1-FP4 TP4",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4",
                  "extra_args": "--tensor-parallel-size 4",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-4",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP4_DP4_EP4",
                  "model_name": "DeepSeek-R1-FP4 TP4 DP4 EP4",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 4 --data-parallel-size 4 --expert-parallel-size 4 --enable-dp-attention --kv-cache-dtype fp8_e4m3 --attention-backend aiter --mem-fraction-static 0.8 --decode-log-interval 1000 --chunked-prefill-size 65536 --max-running-requests 24 --disable-radix-cache",
                  "accuracy_test_threshold": 0.91,
                  "env_vars": "SGLANG_DEFAULT_SERVER_ARGS=\nAITER_QUICK_REDUCE_QUANTIZATION=INT4\nSGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1\nMORI_SHMEM_MODE=ISOLATION\nSGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models\nSGLANG_ENABLE_TORCH_COMPILE=128\nSGLANG_MORI_DISPATCH_DTYPE=bf16\nSGLANG_MORI_NUM_MAX_DISPATCH_TOKENS_PER_RANK=16384",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP8",
                  "model_name": "DeepSeek-R1-FP4 TP8",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4",
                  "extra_args": "--tensor-parallel-size 8",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP8_MTP3",
                  "model_name": "DeepSeek-R1-FP4 TP8 MTP3",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4",
                  "extra_args": "--tensor-parallel-size 8 --speculative-algorithm NEXTN --speculative-num-steps 3 --speculative-eagle-topk 1 --speculative-num-draft-tokens 4",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-8",
              },
              {
                  "toggle_env": "RUN_DSR1_FP4_TP8_MTP1",
                  "model_name": "DeepSeek-R1-FP4 TP8 MTP1",
                  "model_path": "amd/DeepSeek-R1-0528-MXFP4-MTP-MoEFP4",
                  "extra_args": "--tensor-parallel-size 8 --speculative-algorithm NEXTN --speculative-num-steps 1 --speculative-eagle-topk 1 --speculative-num-draft-tokens 2",
                  "accuracy_test_threshold": 0.93,
                  "env_vars": "SGLANG_AITER_FP8_PREFILL_ATTN=0\nSGLANG_USE_AITER=1\nATOM_ENABLE_DS_QKNORM_QUANT_FUSION=1",
                  "runner": "linux-atom-mi35x-8",
              },
          ]

          selected = []
          for model in models:
              enabled = event != "workflow_dispatch" or os.environ.get(model["toggle_env"], "").lower() == "true"
              if enabled:
                  selected.append({k: v for k, v in model.items() if k != "toggle_env"})

          if event == "workflow_dispatch" and not selected:
              print("No models selected for manual run.", file=sys.stderr)
              sys.exit(1)

          print(f"model_matrix={json.dumps({'include': selected})}")
          PY

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] || [ "${GITHUB_REF_NAME}" = "main" ]; then
            if RESOLUTION_JSON="$(
              python3 .github/scripts/resolve_atom_image.py \
                --repository "${VALIDATION_IMAGE_REPO}" \
                --reference-tag sglang-latest \
                --preferred-version "${SGLANG_REF#v}"
            )"; then
              RESOLVED_SGLANG_IMAGE="$(
                RESOLUTION_JSON="${RESOLUTION_JSON}" python3 - <<'PY'
          import json
          import os

          resolution = json.loads(os.environ["RESOLUTION_JSON"])
          print(resolution["resolved_image"])
          PY
              )"
            else
              echo "::warning::Failed to resolve ${NIGHTLY_SGLANG_IMAGE_TAG} to an immutable reference; falling back to the floating tag."
              RESOLVED_SGLANG_IMAGE="${NIGHTLY_SGLANG_IMAGE_TAG}"
            fi
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Manual run on main reuses published SGLANG image: ${RESOLVED_SGLANG_IMAGE}"
            else
              echo "Scheduled run uses published SGLANG image: ${RESOLVED_SGLANG_IMAGE}"
            fi
            echo "sglang_image_tag=${RESOLVED_SGLANG_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "cleanup_temp_image=false" >> "$GITHUB_OUTPUT"
            echo "manual_base_image_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          MANUAL_BASE_IMAGE_TAG="atom_sglang_manual_base:${GITHUB_RUN_ID}-${SHORT_SHA}"
          SGLANG_IMAGE_TAG="${VALIDATION_IMAGE_REPO}:sglang-full-manual-${GITHUB_RUN_ID}-${SHORT_SHA}"
          BUILD_CONTEXT="$(mktemp -d)"
          trap 'rm -rf "${BUILD_CONTEXT}"' EXIT

          git archive --format=tar HEAD | tar -xf - -C "${BUILD_CONTEXT}"

          cat <<'EOF' > "${BUILD_CONTEXT}/Dockerfile.mod"
          ARG ATOM_BASE_NIGHTLY_IMAGE
          FROM ${ATOM_BASE_NIGHTLY_IMAGE}
          ARG GPU_ARCH
          ARG AITER_REPO
          ARG AITER_COMMIT
          RUN pip install -U lm-eval[api]
          RUN pip show lm-eval || true
          RUN pip install hf_transfer
          RUN pip show hf_transfer || true
          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true
          RUN pip uninstall -y amd-aiter
          RUN pip install --upgrade "pybind11>=3.0.1"
          RUN pip show pybind11
          RUN rm -rf /app/aiter-test
          RUN git clone --depth 1 "${AITER_REPO}" /app/aiter-test && \
              cd /app/aiter-test && \
              git checkout "${AITER_COMMIT}" && \
              git submodule sync && git submodule update --init --recursive && \
              MAX_JOBS=64 PREBUILD_KERNELS=0 GPU_ARCHS="${GPU_ARCH}" python3 setup.py develop
          RUN echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true
          RUN echo "=== ATOM version BEFORE uninstall ===" && pip show atom || true
          RUN pip uninstall -y atom
          RUN rm -rf /app/ATOM
          COPY . /app/ATOM
          RUN cd /app/ATOM && pip install -e .
          RUN echo "=== ATOM version AFTER installation ===" && pip show atom || true
          EOF

          echo "Building manual SGLANG image from branch ${GITHUB_REF_NAME}"

          docker build --pull --network=host --no-cache \
            -t "${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg ATOM_BASE_NIGHTLY_IMAGE="${ATOM_BASE_NIGHTLY_IMAGE}" \
            --build-arg GPU_ARCH="${GPU_ARCH}" \
            --build-arg AITER_REPO="${AITER_REPO}" \
            --build-arg AITER_COMMIT="${AITER_COMMIT}" \
            -f "${BUILD_CONTEXT}/Dockerfile.mod" \
            "${BUILD_CONTEXT}"

          docker build --network=host --no-cache \
            -t "${SGLANG_IMAGE_TAG}" \
            --target atom_sglang \
            --build-arg SGLANG_BASE_IMAGE="${MANUAL_BASE_IMAGE_TAG}" \
            --build-arg MAX_JOBS=64 \
            --build-arg SGLANG_REF="${SGLANG_REF}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f "${BUILD_CONTEXT}/docker/Dockerfile" \
            "${BUILD_CONTEXT}"

          docker push "${SGLANG_IMAGE_TAG}"

          echo "sglang_image_tag=${SGLANG_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "cleanup_temp_image=true" >> "$GITHUB_OUTPUT"
          echo "manual_base_image_tag=${MANUAL_BASE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Clean up builder images
        if: ${{ always() && steps.meta.outputs.cleanup_temp_image == 'true' }}
        run: |
          docker rmi "${{ steps.meta.outputs.sglang_image_tag }}" || true
          docker rmi "${{ steps.meta.outputs.manual_base_image_tag }}" || true

  sglang-model-accuracy:
    name: SGLANG Model Accuracy (${{ matrix.model_name }})
    needs: [prepare-sglang-image]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-sglang-image.outputs.model_matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      actions: read
      contents: write
    env:
      CONTAINER_NAME: atom_sglang_validation_${{ strategy.job-index }}
      SGLANG_IMAGE_TAG: ${{ needs.prepare-sglang-image.outputs.sglang_image_tag }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> "$GITHUB_ENV"

      - name: Pull SGLANG image
        run: |
          docker pull "${SGLANG_IMAGE_TAG}"

      - name: Prepare model cache mount
        run: |
          MODEL_CACHE_MOUNT=""
          MODEL_CACHE_DESC="container-local /models (no host cache mount)"

          if [ -d "/models" ]; then
            MODEL_CACHE_MOUNT="-v /models:/models"
            MODEL_CACHE_DESC="/models (host mount)"
          else
            echo "Warning: /models directory not found on runner; using container-local /models."
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          echo "MODEL_CACHE_MOUNT=${MODEL_CACHE_MOUNT}" >> "$GITHUB_ENV"
          echo "MODEL_CACHE_DESC=${MODEL_CACHE_DESC}" >> "$GITHUB_ENV"

      - name: Clean up old containers
        run: |
          containers=$(docker ps -q)
          if [ -n "$containers" ]; then
            docker kill $containers || true
          fi
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

      - name: Start validation container
        run: |
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          MODEL_MOUNT="${MODEL_CACHE_MOUNT}"
          echo "Using model cache backend: ${MODEL_CACHE_DESC}"

          cat > /tmp/sglang_env_file.txt << 'EOF'
          ${{ matrix.env_vars }}
          EOF

          GROUP_ADD_FLAGS="--group-add video"
          if [ "${CONTAINER_ENGINE:-docker}" = "podman" ]; then
            GROUP_ADD_FLAGS="$GROUP_ADD_FLAGS --group-add keep-groups"
          else
            for gid in $(id -G); do
              GROUP_ADD_FLAGS="$GROUP_ADD_FLAGS --group-add $gid"
            done
          fi
          echo "Container group flags: $GROUP_ADD_FLAGS"

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_MOUNT \
            -w /workspace \
            --ipc=host $GROUP_ADD_FLAGS \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --env-file /tmp/sglang_env_file.txt \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --name "$CONTAINER_NAME" \
            "${SGLANG_IMAGE_TAG}"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Collect GPU info (inside container)
        id: gpu-info
        run: bash .github/scripts/collect_gpu_info.sh "$CONTAINER_NAME" docker "${{ matrix.runner }}"

      - name: Download model if needed
        run: |
          set -euo pipefail
          model_dir="/models/${{ matrix.model_path }}"
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            lock_suffix="$(printf '%s' "${{ matrix.model_path }}" | tr '/:@' '___')"
            if ! docker exec \
              -e HF_TOKEN="${HF_TOKEN:-}" \
              -e MODEL_PATH="${{ matrix.model_path }}" \
              -e MODEL_DIR="$model_dir" \
              -e RUNNER_NAME="${{ matrix.runner }}" \
              -e LOCK_SUFFIX="$lock_suffix" \
              "$CONTAINER_NAME" \
              bash -lc '
                set -euo pipefail
                completion_flag="$MODEL_DIR/.download-complete"
                use_model_lock="true"

                if [ "$RUNNER_NAME" = "atom-mi355-8gpu.predownload" ]; then
                  use_model_lock="false"
                fi

                download_model() {
                  if [ -f "$MODEL_DIR/config.json" ]; then
                    echo "Model directory exists without a completion marker under ${MODEL_DIR}; validating download"
                  else
                    echo "Model not found under ${MODEL_DIR}; downloading model"
                  fi

                  rm -f "$completion_flag"
                  hf download "$MODEL_PATH" --local-dir "$MODEL_DIR"
                  touch "$completion_flag"
                }

                if [ -f "$completion_flag" ]; then
                  echo "Model already exists under ${MODEL_DIR}; skip download"
                elif [ "$use_model_lock" != "true" ]; then
                  echo "Baremetal runner ${RUNNER_NAME} detected; skipping shared model download lock"
                  download_model
                else
                  lock_dir="/models/.cache/atom-download-locks"
                  mkdir -p "$lock_dir"
                  lock_file="$lock_dir/${LOCK_SUFFIX}.lock"
                  exec 9>"$lock_file"
                  echo "Waiting for model download lock: $lock_file"
                  if ! flock -w 7200 9; then
                    echo "Timed out waiting for model download lock: $lock_file"
                    exit 1
                  fi

                  if [ -f "$completion_flag" ]; then
                    echo "Model became available under ${MODEL_DIR} while waiting for the lock; skip download"
                  else
                    download_model
                  fi
                fi
              '; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
          else
            echo "/models directory not mounted; skipping model download"
          fi

      - name: Resolve SGLANG model path
        if: success()
        run: |
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            echo "SGLANG_RESOLVED_MODEL_PATH=/models/${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using mounted model path: /models/${{ matrix.model_path }}"
          else
            echo "SGLANG_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
            echo "Using model id: ${{ matrix.model_path }}"
          fi

      - name: Run SGLANG launch and gsm8k accuracy via script (full mode)
        timeout-minutes: 120
        env:
          SGLANG_MODEL_NAME: ${{ matrix.model_name }}
          SGLANG_MODEL_PATH: ${{ matrix.model_path }}
          SGLANG_EXTRA_ARGS: ${{ matrix.extra_args }}
          SGLANG_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_SGLANG_LOGS: "1"
          LM_EVAL_TASK: "gsm8k"
        run: |
          docker exec \
            -e SGLANG_MODEL_NAME="${SGLANG_MODEL_NAME}" \
            -e SGLANG_MODEL_PATH="${SGLANG_RESOLVED_MODEL_PATH:-$SGLANG_MODEL_PATH}" \
            -e SGLANG_EXTRA_ARGS="${SGLANG_EXTRA_ARGS}" \
            -e SGLANG_ENV_VARS="${SGLANG_ENV_VARS}" \
            -e SGLANG_DOCKER_IMAGE="${SGLANG_IMAGE_TAG}" \
            -e GPU_NAME="${{ steps.gpu-info.outputs.gpu_name }}" \
            -e GPU_VRAM_GB="${{ steps.gpu-info.outputs.gpu_vram_gb }}" \
            -e ROCM_VERSION="${{ steps.gpu-info.outputs.rocm_version }}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_SGLANG_LOGS="${STREAM_SGLANG_LOGS}" \
            -e LM_EVAL_TASK="${LM_EVAL_TASK}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_sglang_test.sh accuracy
            "

      - name: Check SGLANG accuracy test results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true
          result_file=$(ls -1t atom_sglang_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in atom_sglang_accuracy_results/"
            exit 2
          fi

          echo "RESULT_FILE: $result_file"
          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          else
            echo "Accuracy test passed: Flexible extract value $flexible_extract_value is greater than or equal to threshold ${{ matrix.accuracy_test_threshold }}."
            exit 0
          fi

      - name: Collect summary
        if: success()
        run: |
          echo "SGLANG gsm8k summary for ${{ matrix.model_name }}:" >> $GITHUB_STEP_SUMMARY
          docker exec "$CONTAINER_NAME" bash -lc "awk '/\|Tasks\|Version\|/,/^$/ { if (NF > 0) print }' /tmp/atom_sglang_accuracy_output.txt" >> $GITHUB_STEP_SUMMARY || true

      - name: Collect artifacts
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang.log ./atom_sglang.log || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_output.txt ./atom_sglang_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true

      - name: Upload model artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sglang-validation-${{ matrix.model_name }}-${{ github.run_id }}
          path: |
            atom_sglang.log
            atom_sglang_accuracy_output.txt
            atom_sglang_accuracy_results

      - name: Upload accuracy results for dashboard
        if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.upload_accuracy_to_dashboard)) }}
        uses: actions/upload-artifact@v7
        with:
          name: accuracy-${{ matrix.model_name }}
          path: atom_sglang_accuracy_results/*.json
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/atom_sglang.pid ]; then kill \$(cat /tmp/atom_sglang.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker rmi "${SGLANG_IMAGE_TAG}" || true

  accuracy-dashboard:
    name: Update SGLANG accuracy dashboard
    needs: [sglang-model-accuracy]
    if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.upload_accuracy_to_dashboard)) }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Prepare accuracy artifact directory
        run: mkdir -p /tmp/accuracy-results

      - name: Download accuracy artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/accuracy-results
          pattern: accuracy-*
        continue-on-error: true

      - name: Count downloaded accuracy artifacts
        id: downloaded
        run: |
          json_count=$(find /tmp/accuracy-results -type f -name '*.json' | wc -l | tr -d ' ')
          echo "json_count=${json_count}" >> "$GITHUB_OUTPUT"
          echo "Downloaded ${json_count} SGLANG accuracy JSON files"

      - name: List downloaded accuracy artifacts
        if: steps.downloaded.outputs.json_count != '0'
        run: |
          echo "=== Downloaded SGLANG accuracy artifacts ==="
          find /tmp/accuracy-results -type f -name '*.json' | head -20 || echo "No JSON files found"

      - name: Transform SGLANG accuracy results for dashboard
        id: transform
        if: steps.downloaded.outputs.json_count != '0'
        run: |
          python3 .github/scripts/accuracy_to_dashboard.py \
            /tmp/accuracy-results \
            --output accuracy-benchmark-input.json \
            --models .github/benchmark/sglang_models_accuracy.json \
            --backend "ATOM-SGLang" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=== Generated entries ==="
          cat accuracy-benchmark-input.json
          entries_count=$(python3 -c "import json; data=json.load(open('accuracy-benchmark-input.json')); print(len(data))")
          echo "entries_count=${entries_count}" >> "$GITHUB_OUTPUT"
          if [ "${entries_count}" = "0" ]; then
            echo "::warning::No valid SGLANG accuracy entries were produced. Check that the result JSON files contain 'results.gsm8k[\"exact_match,flexible-extract\"]'."
          fi

      - name: Store SGLANG accuracy result to dashboard
        if: steps.transform.outputs.entries_count != '0' && steps.transform.outputs.entries_count != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: accuracy-benchmark-input.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmark-dashboard
          auto-push: true
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
