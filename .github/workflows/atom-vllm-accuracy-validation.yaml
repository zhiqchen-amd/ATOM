  NIGHTLY_OOT_IMAGE_TAG: rocm/atom-dev:vllm-latest
  VALIDATION_IMAGE_REPO: rocm/atom-dev
  GPU_ARCH: "gfx942;gfx950"
  AITER_REPO: "https://github.com/ROCm/aiter.git"
  AITER_COMMIT: "HEAD"
  VLLM_COMMIT: "2a69949bdadf0e8942b7a1619b229cb475beef20"

jobs:
  # ---------- OOT full validation path (schedule / workflow_dispatch) ----------
  prepare-oot-image:
    name: Prepare validation image
    runs-on: build-only-atom
    permissions:
      actions: read
      contents: read
    outputs:
      oot_image_tag: ${{ steps.meta.outputs.oot_image_tag }}
      cleanup_temp_image: ${{ steps.meta.outputs.cleanup_temp_image }}
      model_matrix_slot_1: ${{ steps.meta.outputs.model_matrix_slot_1 }}
      model_matrix_slot_2: ${{ steps.meta.outputs.model_matrix_slot_2 }}
      model_matrix_slot_3: ${{ steps.meta.outputs.model_matrix_slot_3 }}
      slot_1_has_models: ${{ steps.meta.outputs.slot_1_has_models }}
      slot_2_has_models: ${{ steps.meta.outputs.slot_2_has_models }}
      slot_3_has_models: ${{ steps.meta.outputs.slot_3_has_models }}
      scheduled_beijing_date: ${{ steps.meta.outputs.scheduled_beijing_date }}
    steps:
      - name: Checkout selected ATOM branch
        uses: actions/checkout@v6

      - name: Docker Login
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Resolve image source and model matrix
        id: meta
        env:
          MODEL_SLOT_1: ${{ inputs.model_slot_1 || 'none' }}
          MODEL_SLOT_2: ${{ inputs.model_slot_2 || 'none' }}
          MODEL_SLOT_3: ${{ inputs.model_slot_3 || 'none' }}
          MODEL_SLOT_4: ${{ inputs.model_slot_4 || 'none' }}
          MODEL_SLOT_5: ${{ inputs.model_slot_5 || 'none' }}
          MODEL_SLOT_6: ${{ inputs.model_slot_6 || 'none' }}
          MODEL_SLOT_7: ${{ inputs.model_slot_7 || 'none' }}
          MODEL_SLOT_8: ${{ inputs.model_slot_8 || 'none' }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          INPUT_OOT_IMAGE: ${{ inputs.oot_image || '' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            SCHEDULE_CREATED_AT="$(
              python3 - <<'PY'
          import json
          import os
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com")
          repository = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          token = os.environ.get("GITHUB_TOKEN", "")
          request = Request(
              f"{api_url}/repos/{repository}/actions/runs/{run_id}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "User-Agent": "atom-vllm-accuracy-nightly-priority",
              },
          )
          try:
              with urlopen(request, timeout=30) as response:
                  payload = json.load(response)
          except HTTPError as exc:
              detail = exc.read().decode("utf-8", errors="replace").strip()
              raise RuntimeError(
                  f"Failed to fetch workflow run metadata: HTTP {exc.code} {detail}"
              ) from exc
          except URLError as exc:
              raise RuntimeError(
                  f"Failed to reach GitHub API for workflow run metadata: {exc}"
              ) from exc

          created_at = payload.get("created_at")
          if not created_at:
              raise RuntimeError("Workflow run metadata did not include created_at")
          print(created_at)
          PY
            )"
            export SCHEDULE_CREATED_AT
          else
            export SCHEDULE_CREATED_AT=""
          fi

          # Keep this Python model list as the single source of truth for OOT
          # full-validation coverage and manual checkbox filtering.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          from datetime import datetime, timedelta, timezone

          event = os.environ["GITHUB_EVENT_NAME"]
          models = [
              {
                  "toggle_env": "RUN_QWEN3_MOE_TP8",
                  "model_name": "Qwen3-235B-A22B-Instruct-2507-FP8 TP8+EP8",
                  "model_path": "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8",
                  "extra_args": "--tensor-parallel-size 8 --enable-expert-parallel",
                  "accuracy_test_threshold": 0.87,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1\nATOM_FP8_BLOCKSCALE_WEIGHT_PRESHUFFLE=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_TP1",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8 TP1",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
                  "extra_args": "--tensor-parallel-size 1",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1\nATOM_USE_CUSTOM_ALL_GATHER=0\nATOM_USE_FLYDSL_GDR=1\nATOM_FP8_BLOCKSCALE_WEIGHT_PRESHUFFLE=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_TP2",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8 TP2",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
                  "extra_args": "--trust-remote-code --tensor-parallel-size 2 --max-num-batched-tokens 32768 --max-model-len 16384",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "AITER_QUICK_REDUCE_QUANTIZATION=INT4\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1\nATOM_USE_CUSTOM_ALL_GATHER=0\nATOM_USE_FLYDSL_GDR=1\nATOM_FP8_BLOCKSCALE_WEIGHT_PRESHUFFLE=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_TP4",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8 TP4",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
                  "extra_args": "--tensor-parallel-size 4",
                  "accuracy_test_threshold": 0.83,
                  "env_vars": "AITER_QUICK_REDUCE_QUANTIZATION=INT4\nATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1\nATOM_USE_CUSTOM_ALL_GATHER=0\nATOM_USE_FLYDSL_GDR=1\nATOM_FP8_BLOCKSCALE_WEIGHT_PRESHUFFLE=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_MTP_TP1",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8-MTP TP1",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
                  "extra_args": "--tensor-parallel-size 1 --speculative-config '{\"num_speculative_tokens\":1, \"method\": \"mtp\"}'",
                  "accuracy_test_threshold": 0.80,
                  "env_vars": "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=1\nATOM_USE_CUSTOM_ALL_GATHER=0\nATOM_USE_FLYDSL_GDR=1\nATOM_FP8_BLOCKSCALE_WEIGHT_PRESHUFFLE=0",
                  "runner": "atom-plugin-acc-validation-runner",
              },
              {
                  "toggle_env": "RUN_QWEN3_NEXT_80B_MTP_TP4",
                  "model_name": "Qwen3-Next-80B-A3B-Instruct-FP8-MTP TP4",
                  "model_path": "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8",
