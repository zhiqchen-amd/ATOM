name: Nightly Docker Release

on:
  schedule:
    - cron: '0 14 * * *'  # Every day at 22:00 Beijing Time (UTC+8)
  workflow_dispatch:
    inputs:
      base_image:
        description: "Base Docker image for ATOM build"
        type: choice
        default: "rocm/pytorch:latest"
        options:
          - rocm/pytorch:latest
          - rocm/pytorch-nightly:latest
          - rocm/pytorch:rocm7.1.1_ubuntu24.04_py3.12_pytorch_release_2.10.0
      atom_repo:
        description: "ATOM repo"
        default: "https://github.com/ROCm/ATOM.git"
      atom_commit:
        description: "ATOM commit"
        default: "HEAD"
      aiter_repo:
        description: "Aiter repo"
        default: "https://github.com/ROCm/aiter.git"
      aiter_commit:
        description: "Aiter commit"
        default: "HEAD"
      rccl_repo:
        description: "RCCL repo"
        default: "https://github.com/ROCm/rccl.git"
      rccl_branch:
        description: "RCCL branch"
        default: "29e1567b95e28823b0beb1a988adc587bfab5b4f"
      sglang_repo:
        description: "SGLang repo"
        default: "https://github.com/sgl-project/sglang.git"
      sglang_ref:
        description: "SGLang git ref"
        default: "v0.5.10"
      sglang_version:
        description: "SGLang version used in the published tag"
        default: "0.5.10"
      runner:
        description: "Runner label to use"
        type: choice
        default: "linux-atom-mi35x-1"
        options:
          - linux-atom-mi35x-1
          - build-only-atom
          - atom-mi355-8gpu.predownload
      skip_tests:
        description: "Skip test step"
        type: boolean
        default: false
      custom_tag:
        description: "Custom tag for the native Docker image (e.g. 'my-feature'). Produces rocm/atom-dev:<custom_tag>. When set, branch-based tagging and 'latest' update are skipped."
        default: ""
      build_oot_image:
        description: "Build OOT vLLM image for manual runs (scheduled nightly runs always build OOT; default enabled so manual releases also publish OOT)"
        type: boolean
        default: true
      oot_tag_suffix:
        description: "Optional suffix appended to the OOT vLLM nightly tag for manual runs. Example: custom -> rocm/atom-dev:vllm-v<version>-nightly_<date>-custom. When set, vllm-latest is not updated."
        default: ""
      build_sglang_image:
        description: "Build SGLang+ATOM image for manual runs (scheduled nightly runs always build SGLang+ATOM; default enabled so manual releases also publish SGLang+ATOM)"
        type: boolean
        default: true
      sglang_tag_suffix:
        description: "Optional suffix appended to the SGLang nightly tag for manual runs. Example: custom -> rocm/atom-dev:sglang-v<version>-nightly_<date>-custom. When set, sglang-latest is not updated."
        default: ""
      only_release_oot:
        description: "Release the OOT vLLM image (skips native image test/push). If both this and SGLang are checked, both will be released."
        type: boolean
        default: false
      only_release_sglang:
        description: "Release the SGLang+ATOM image (skips native image test/push). If both this and OOT are checked, both will be released."
        type: boolean
        default: false

jobs:
  docker-release:
    name: Nightly Docker Release
    runs-on: ${{ inputs.runner || 'linux-atom-mi35x-1' }}
    strategy:
      fail-fast: false
      matrix:
        base_image:
          - ${{ inputs.base_image || 'rocm/pytorch:latest' }}

    env:
      ATOM_REPO: "https://github.com/ROCm/ATOM.git"
      ATOM_COMMIT: "HEAD"
      AITER_REPO: "https://github.com/ROCm/aiter.git"
      AITER_COMMIT: "HEAD"
      RCCL_REPO: "https://github.com/ROCm/rccl.git"
      RCCL_BRANCH: "29e1567b95e28823b0beb1a988adc587bfab5b4f"
      GPU_ARCH: "gfx942;gfx950"
      VLLM_COMMIT: "0b3ba88f165976e77ca5e6a7a3f5bba4562b80af"
      VLLM_VERSION: "0.22.0"
      SGLANG_REPO: "https://github.com/sgl-project/sglang.git"
      SGLANG_REF: "v0.5.10"
      SGLANG_VERSION: "0.5.10"

    steps:
      - name: Set HF_TOKEN
        run: echo "HF_TOKEN=${HF_TOKEN:-${{ secrets.AMD_HF_TOKEN }}}" >> $GITHUB_ENV

      - name: Checkout ATOM repo
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Echo environment variables
        run: |
          echo "ATOM_REPO: ${{ inputs.atom_repo || env.ATOM_REPO }}"
          echo "ATOM_BRANCH: ${{ github.ref_name }}"
          echo "ATOM_COMMIT: ${{ inputs.atom_commit || env.ATOM_COMMIT }}"
          echo "AITER_REPO: ${{ inputs.aiter_repo || env.AITER_REPO }}"
          echo "AITER_COMMIT: ${{ inputs.aiter_commit || env.AITER_COMMIT }}"
          echo "RCCL_REPO: ${{ inputs.rccl_repo || env.RCCL_REPO }}"
          echo "RCCL_BRANCH: ${{ inputs.rccl_branch || env.RCCL_BRANCH }}"
          echo "OOT_TAG_SUFFIX: ${{ inputs.oot_tag_suffix || '' }}"
          echo "SGLANG_TAG_SUFFIX: ${{ inputs.sglang_tag_suffix || '' }}"
          echo "CUSTOM_TAG: ${{ inputs.custom_tag || '' }}"
          echo "SGLANG_REPO: ${{ inputs.sglang_repo || env.SGLANG_REPO }}"
          echo "SGLANG_REF: ${{ inputs.sglang_ref || env.SGLANG_REF }}"
          echo "SGLANG_VERSION: ${{ inputs.sglang_version || env.SGLANG_VERSION }}"

      - name: Build Docker image
        timeout-minutes: 180
        run: |
          ATOM_COMMIT="${{ inputs.atom_commit || env.ATOM_COMMIT }}"
          if [ "${ATOM_COMMIT}" = "HEAD" ]; then
            ATOM_CHECKOUT="${{ github.ref_name }}"
          else
            ATOM_CHECKOUT="${ATOM_COMMIT}"
          fi
          echo "ATOM checkout ref: ${ATOM_CHECKOUT} (branch: ${{ github.ref_name }})"
          DOCKER_BUILDKIT=1 docker build --pull --network=host -t atom_release:ci \
          --target atom_image \
          --build-arg BASE_IMAGE="${{ matrix.base_image }}" \
          --build-arg GPU_ARCH="${{ env.GPU_ARCH }}" \
          --build-arg ATOM_REPO="${{ inputs.atom_repo || env.ATOM_REPO }}" \
          --build-arg ATOM_COMMIT="${ATOM_CHECKOUT}" \
          --build-arg AITER_REPO="${{ inputs.aiter_repo || env.AITER_REPO }}" \
          --build-arg AITER_COMMIT="${{ inputs.aiter_commit || env.AITER_COMMIT }}" \
          --build-arg RCCL_REPO="${{ inputs.rccl_repo || env.RCCL_REPO }}" \
          --build-arg RCCL_BRANCH="${{ inputs.rccl_branch || env.RCCL_BRANCH }}" \
          --build-arg CACHEBUST=$(date +%s) \
          -f docker/Dockerfile .
          docker inspect atom_release:ci

      - name: Test Docker image
        if: ${{ inputs.skip_tests != true && inputs.only_release_oot != true && inputs.only_release_sglang != true }}
        timeout-minutes: 60
        run: |
          echo "Clean up containers..."
          docker ps -aq -f name=atom_release_ci | xargs -r docker stop | xargs -r docker rm
              
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi
              
          echo "Starting container: atom_release_ci (image: atom_release:ci)"
          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            --ipc=host --group-add video \
            --shm-size 16g \
            --cap-add=SYS_PTRACE \
            -e HF_TOKEN="${HF_TOKEN:-}" \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --name atom_release_ci \
            atom_release:ci
              
          docker exec atom_release_ci bash -c \
            "rm -f ~/.cache/huggingface/token ~/.cache/huggingface/stored_tokens 2>/dev/null; \
             python3 -m atom.examples.simple_inference \
               --model meta-llama/Meta-Llama-3-8B-Instruct \
               --temperature 0 | grep -E '^Prompt: |^Completion:'" > atom_release_output.txt
          
          echo ""
          echo "========== Showing release output below =========="
          cat atom_release_output.txt

          echo ""
          echo "========== Comparing output with golden outputs =========="
          # Ignore whitespace and EOL differences in the diff
          diff -u -B -w --strip-trailing-cr atom_release_output.txt .github/workflows/golden_outputs.txt || true
          DIFF_EXIT_CODE=$?
          
          if [ $DIFF_EXIT_CODE -ne 0 ]; then
            echo "Output does not match golden outputs."
            exit 1
          else
            echo "Output matches golden outputs."
          fi

      - name: Push Docker image
        if: ${{ success() && inputs.only_release_oot != true && inputs.only_release_sglang != true }}
        run: |
          CUSTOM_TAG="${{ inputs.custom_tag || '' }}"
          if [ -n "${CUSTOM_TAG}" ]; then
            if [[ ! "${CUSTOM_TAG}" =~ ^[A-Za-z0-9_.-]+$ ]]; then
              echo "Invalid custom_tag '${CUSTOM_TAG}'. Allowed characters: letters, numbers, '.', '_' and '-'."
              exit 1
            fi
            docker tag atom_release:ci rocm/atom-dev:${CUSTOM_TAG}
            docker push rocm/atom-dev:${CUSTOM_TAG}
            echo "Custom tag: rocm/atom-dev:${CUSTOM_TAG}. Skipping latest update."
          else
            BRANCH="${{ github.ref_name }}"
            DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
            TAG=nightly_$(date +%Y%m%d%H%M)
            if [ "${BRANCH}" != "${DEFAULT_BRANCH}" ]; then
              SAFE_BRANCH=$(echo "${BRANCH}" | sed 's/[^A-Za-z0-9._-]/-/g')
              TAG="${TAG}-${SAFE_BRANCH}"
              docker tag atom_release:ci rocm/atom-dev:${TAG}
              docker push rocm/atom-dev:${TAG}
              echo "Branch '${BRANCH}'; tag: rocm/atom-dev:${TAG}. Skipping latest update."
            else
              docker tag atom_release:ci rocm/atom-dev:latest
              docker push rocm/atom-dev:latest
              docker tag atom_release:ci rocm/atom-dev:${TAG}
              docker push rocm/atom-dev:${TAG}
            fi
          fi

      - name: Build OOT Docker image
        if: ${{ success() && (inputs.only_release_oot == true || (inputs.only_release_sglang != true && (github.event_name == 'schedule' || inputs.build_oot_image == true))) }}
        timeout-minutes: 180
        run: |
          OOT_BASE_IMAGE="atom_release:ci"
          echo "Using OOT base image: ${OOT_BASE_IMAGE}"
          docker build --network=host -t atom_oot_release:ci \
            --target atom_oot \
            --build-arg OOT_BASE_IMAGE="${OOT_BASE_IMAGE}" \
            --build-arg MAX_JOBS=64 \
            --build-arg VLLM_COMMIT="${{ env.VLLM_COMMIT }}" \
            --build-arg INSTALL_LM_EVAL=1 \
            --build-arg INSTALL_FASTSAFETENSORS=1 \
            -f docker/Dockerfile .
          docker inspect atom_oot_release:ci

      - name: Push OOT Docker image
        if: ${{ success() && (inputs.only_release_oot == true || (inputs.only_release_sglang != true && (github.event_name == 'schedule' || inputs.build_oot_image == true))) }}
        run: |
          set -euo pipefail
          VLLM_VER="${{ env.VLLM_VERSION }}"
          OOT_TAG_SUFFIX="${{ inputs.oot_tag_suffix || '' }}"
          OOT_TAG="vllm-v${VLLM_VER}-nightly_$(date +%Y%m%d)"
          OOT_LATEST_TAG="vllm-latest"
          if [ -n "${OOT_TAG_SUFFIX}" ]; then
            if [[ ! "${OOT_TAG_SUFFIX}" =~ ^[A-Za-z0-9_.-]+$ ]]; then
              echo "Invalid oot_tag_suffix '${OOT_TAG_SUFFIX}'. Allowed characters: letters, numbers, '.', '_' and '-'."
              exit 1
            fi
            OOT_TAG="${OOT_TAG}-${OOT_TAG_SUFFIX}"
          fi
          docker tag atom_oot_release:ci rocm/atom-dev:${OOT_TAG}
          docker push rocm/atom-dev:${OOT_TAG}
          if [ -z "${OOT_TAG_SUFFIX}" ]; then
            docker tag atom_oot_release:ci rocm/atom-dev:${OOT_LATEST_TAG}
            docker push rocm/atom-dev:${OOT_LATEST_TAG}
          else
            echo "Custom OOT tag suffix '${OOT_TAG_SUFFIX}' provided; skipping rocm/atom-dev:${OOT_LATEST_TAG} update."
          fi

      - name: Build SGLang Docker image
        if: ${{ success() && (inputs.only_release_sglang == true || (inputs.only_release_oot != true && (github.event_name == 'schedule' || inputs.build_sglang_image == true))) }}
        timeout-minutes: 180
        run: |
          SGLANG_BASE_IMAGE="atom_release:ci"
          echo "Using SGLang+ATOM base image: ${SGLANG_BASE_IMAGE}"
          docker build --network=host -t atom_sglang_release:ci \
            --target atom_sglang \
            --build-arg SGLANG_BASE_IMAGE="${SGLANG_BASE_IMAGE}" \
            --build-arg GPU_ARCH="${{ env.GPU_ARCH }}" \
            --build-arg SGLANG_REPO="${{ inputs.sglang_repo || env.SGLANG_REPO }}" \
            --build-arg SGLANG_REF="${{ inputs.sglang_ref || env.SGLANG_REF }}" \
            -f docker/Dockerfile .
          docker inspect atom_sglang_release:ci

      - name: Push SGLang+ATOM Docker image
        if: ${{ success() && (inputs.only_release_sglang == true || (inputs.only_release_oot != true && (github.event_name == 'schedule' || inputs.build_sglang_image == true))) }}
        run: |
          set -euo pipefail
          SGLANG_VER="${{ inputs.sglang_version || env.SGLANG_VERSION }}"
          SGLANG_TAG_SUFFIX="${{ inputs.sglang_tag_suffix || '' }}"
          SGLANG_TAG="sglang-v${SGLANG_VER}-nightly_$(date +%Y%m%d)"
          SGLANG_LATEST_TAG="sglang-latest"
          if [ -n "${SGLANG_TAG_SUFFIX}" ]; then
            if [[ ! "${SGLANG_TAG_SUFFIX}" =~ ^[A-Za-z0-9_.-]+$ ]]; then
              echo "Invalid sglang_tag_suffix '${SGLANG_TAG_SUFFIX}'. Allowed characters: letters, numbers, '.', '_' and '-'."
              exit 1
            fi
            SGLANG_TAG="${SGLANG_TAG}-${SGLANG_TAG_SUFFIX}"
          fi
          docker tag atom_sglang_release:ci rocm/atom-dev:${SGLANG_TAG}
          docker push rocm/atom-dev:${SGLANG_TAG}
          if [ -z "${SGLANG_TAG_SUFFIX}" ]; then
            docker tag atom_sglang_release:ci rocm/atom-dev:${SGLANG_LATEST_TAG}
            docker push rocm/atom-dev:${SGLANG_LATEST_TAG}
          else
            echo "Custom SGLang tag suffix '${SGLANG_TAG_SUFFIX}' provided; skipping rocm/atom-dev:${SGLANG_LATEST_TAG} update."
          fi

      - name: Clean Up
        if: always()
        run: |
          docker stop atom_release_ci || true
          docker rm atom_release_ci || true
          # Remove build and tagged images to free disk space
          docker rmi atom_release:ci || true
          docker rmi rocm/atom-dev:latest || true
          docker rmi atom_oot_release:ci || true
          docker rmi atom_sglang_release:ci || true
          # Remove nightly tagged image if it exists
          docker images "rocm/atom-dev:nightly_*" -q | xargs -r docker rmi || true
          docker images "rocm/atom-dev:vllm-v*-nightly_*" -q | xargs -r docker rmi || true
          docker images "rocm/atom-dev:sglang-v*-nightly_*" -q | xargs -r docker rmi || true
          docker rmi rocm/atom-dev:vllm-latest || true
          docker rmi rocm/atom-dev:sglang-latest || true
