name: ATOM vLLM Benchmark

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event_name }}-${{ github.ref_name }}
  # Keep long-running nightly jobs alive; the next nightly run can queue behind them.
  cancel-in-progress: false

on:
  schedule:
    # Tue-Sun 00:30 Beijing (Mon-Sat 16:30 UTC): delayed previous-evening slot.
    # Effective Mon/Wed AW P0; Tue/Thu AW P0+Met P0; Fri AW all; Sat AW P0+OOB.
    - cron: '30 16 * * 1-6'
    # Sat/Sun 10:00 Beijing (02:00 UTC): Sat AW P1+P2+Met P0; Sun AW all+Met P1.
    - cron: '0 2 * * 0,6'
  workflow_dispatch:
    inputs:
      benchmark_client:
        description: "Benchmark client command. `InferenceMax bench` uses the repo benchmark script. `vLLM bench` uses the vLLM CLI benchmark command."
        type: choice
        default: InferenceMax bench
        options:
          - InferenceMax bench
          - vLLM bench
      model_slot_1:
        description: "Manual selection slot 1: choose a model + TP size candidate."
        type: choice
        default: none
        options:
          - none
          - DeepSeek-R1 FP8 TP8 (MET)
          - DeepSeek-R1 MXFP4 TP8 (MET)
          - gpt-oss-120b TP1 (MET)
          - GLM-5.1-FP8 TP8 (OOB)
          - Kimi-K2-Thinking-MXFP4 TP4 (MET)
          - Kimi-K2-Thinking-MXFP4 TP8 (MET)
          - Kimi-K2.5-MXFP4 TP4 (MET)
