<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATOM Benchmark Dashboard</title>
  <link rel="icon" type="image/png" href="atom_logo_mini.png" />
  <script>if(localStorage.getItem('atom-dash-theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
  <style>
    /* ============================================================
       CSS VARIABLES & RESET
       ============================================================ */
    :root {
      /* Background — pure dark, high contrast */
      --bg-primary: #0b0c10; --bg-secondary: #141519; --bg-tertiary: #1c1d24;
      --border: #303140; --border-light: #262733;
      /* Text — brighter for readability */
      --text-primary: #eef0f6; --text-secondary: #bfc1d0; --text-tertiary: #7e8094;
      /* Brand — ATOM logo magenta, accent only (header line, logo) */
      --brand: #d86ecc; --brand-dim: rgba(216,110,204,0.12);
      /* UI accent — slightly brighter slate blue */
      --ui: #8899b8; --ui-bright: #a4b3ce; --ui-dim: rgba(136,153,184,0.12);
      /* Semantic — slightly more vivid */
      --accent-green: #6dbf80; --accent-red: #f25c4e;
      --accent-orange: #eda06a; --accent-purple: #c49af5; --accent-yellow: #ddb040;
      /* Spacing */
      --gap-sm: 8px; --gap-md: 16px; --gap-lg: 24px; --radius: 8px;
    }
    [data-theme="light"] {
      --bg-primary: #f5f6fa; --bg-secondary: #ffffff; --bg-tertiary: #ebedf3;
      --border: #d0d3dc; --border-light: #e2e4eb;
      --text-primary: #1a1c24; --text-secondary: #4a4d5e; --text-tertiary: #7e8094;
      --brand: #c054b4; --brand-dim: rgba(192,84,180,0.10);
      --ui: #5a6d8a; --ui-bright: #3d5278; --ui-dim: rgba(90,109,138,0.10);
      --accent-green: #2e8b47; --accent-red: #d63a2f;
      --accent-orange: #c47a30; --accent-purple: #8b5ec0; --accent-yellow: #b08a20;
      --table-stripe: rgba(0,0,0,0.03);
    }
    .header-left > div { position: relative; }
    h1 { line-height: 24px; }
    .theme-toggle { position: absolute; right: 0; top: 5px; display: block; width: 28px; height: 14px; background: var(--border); border: none; border-radius: 7px; cursor: pointer; transition: background 0.2s; }
    .theme-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 10px; height: 10px; background: var(--text-primary); border-radius: 50%; transition: transform 0.2s; }
    [data-theme="light"] .theme-toggle { background: var(--border); }
    [data-theme="light"] .theme-toggle::after { transform: translateX(14px); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-secondary); }
    .container { max-width: 1440px; margin: 0 auto; padding: var(--gap-lg); }
    a { color: var(--ui-bright); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 12px; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; }

    /* ============================================================
       HEADER & FILTER BAR
       ============================================================ */
    header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--gap-md); padding: var(--gap-md) var(--gap-lg); border-bottom: 2px solid var(--brand); position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: var(--bg-primary); max-width: 1440px; margin: 0 auto; }
    .header-spacer { margin-bottom: var(--gap-lg); }
    .fixed-thead { position: fixed; z-index: 40; background: var(--bg-secondary); display: none; overflow: hidden; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { height: 36px; opacity: 0.9; display: block; }
    h1 { font-size: 20px; color: var(--text-primary); font-weight: 600; }
    h1 .h1-sep { color: var(--text-tertiary); font-weight: 300; margin: 0 2px; }
    h1 .h1-sub { color: var(--text-secondary); font-weight: 400; }
    .meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

    .filter-bar { display: flex; gap: var(--gap-sm); flex-wrap: wrap; align-items: center; position: relative; }
    .filter-group { position: relative; }
    .filter-btn { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .filter-btn[data-filter="dashboard-mode"] { width: 116px; text-align: left; }
    .dashboard-mode-group { position: absolute; right: calc(100% + var(--gap-sm)); top: 0; }
    .filter-btn:hover, .filter-btn.open { background: var(--bg-tertiary); color: var(--text-primary); }
    .filter-btn .count { background: var(--ui); color: #fff; border-radius: 10px; padding: 1px 6px; margin-left: 4px; font-size: 10px; }
    .filter-dropdown { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 0; min-width: 200px; max-height: 300px; overflow-y: auto; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); right: auto; }
    .filter-group:last-of-type .filter-dropdown { left: auto; right: 0; }
    .filter-dropdown.open { display: block; }
    .filter-dropdown label { display: flex; align-items: center; gap: 8px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: var(--text-secondary); }
    .filter-dropdown label:hover { background: var(--bg-tertiary); }
    .filter-dropdown input[type="checkbox"],
    .filter-dropdown input[type="radio"] { accent-color: var(--ui); }
    .filter-dropdown .sep { border-top: 1px solid var(--border); margin: 4px 0; }
    .filter-summary { font-size: 11px; color: var(--text-tertiary); margin-left: 4px; white-space: nowrap; }
    .filter-reset { background: none; color: var(--text-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .filter-reset:hover { color: var(--text-secondary); background: var(--bg-tertiary); }

    /* ============================================================
       KPI CARDS (Level 1 — Overview)
       ============================================================ */
    .kpi-row { display: flex; gap: var(--gap-lg); margin-bottom: var(--gap-lg); }
    .kpi-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--gap-md); flex: 1; }
    .kpi-group + .kpi-group { border-left: 1px solid var(--border); padding-left: var(--gap-lg); }
    .kpi-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap-md); }
    .kpi-card .kpi-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .kpi-card .kpi-value { font-size: 28px; font-weight: 700; color: var(--text-primary); font-family: "SF Mono", "Fira Code", monospace; }
    .kpi-card .kpi-unit { font-size: 13px; color: var(--text-tertiary); font-weight: 400; }
    .kpi-card .kpi-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; min-height: 16px; }
    .kpi-card .kpi-trend { font-size: 12px; font-weight: 600; margin-top: 2px; }
    .kpi-card.alert { border-color: var(--accent-red); animation: pulse-border 2s infinite; }
    .kpi-card.alert-warning { border-color: var(--accent-orange); }
    .kpi-card.ok { border-color: var(--border); }
    .kpi-card.ok .kpi-label { color: var(--accent-green); }
    @keyframes pulse-border { 0%, 100% { border-color: var(--accent-red); } 50% { border-color: rgba(242,92,78,0.3); } }
    .kpi-card.clickable { cursor: pointer; }
    .kpi-card.clickable:hover { background: var(--bg-tertiary); }
    .perf-table tbody tr.flash { animation: flash-row 1.5s ease-out; }
    @keyframes flash-row { 0% { background: rgba(242,92,78,0.3); } 100% { background: transparent; } }
    .trend-jump { background: none; color: var(--text-tertiary); border: none; padding: 0; font-size: 11px; cursor: pointer; margin-left: 4px; }
    .trend-jump:hover { color: var(--text-secondary); }
    .trend-up { color: var(--accent-green); }
    .trend-down { color: var(--accent-red); }
    .trend-neutral { color: var(--text-tertiary); }
    /* Throughput: up is good. TPOT/TTFT: down is good — callers handle inversion */

    /* ============================================================
       TABS (Level 2 — Diagnostic)
       ============================================================ */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: var(--gap-lg); }
    .tab { padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--ui); }
    .tab .tab-badge { display: inline-block; margin-left: 4px; vertical-align: middle; font-size: 10px; font-weight: 600; min-width: 16px; height: 16px; line-height: 16px; text-align: center; border-radius: 8px; padding: 0 4px; }
    .tab .tab-badge.warn { background: rgba(237,160,106,0.2); color: var(--accent-orange); }
    .tab .tab-badge.alert { background: rgba(242,92,78,0.2); color: var(--accent-red); }
    .tab .tab-badge.hidden { display: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ============================================================
       CHART CARDS
       ============================================================ */
    .section-container { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap-md); margin-bottom: var(--gap-lg); }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--gap-md); padding-bottom: var(--gap-sm); border-bottom: 1px solid var(--border-light); }
    .section-title { font-size: 13px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .chart-grid { display: grid; grid-template-columns: 1fr; gap: var(--gap-lg); }
    .chart-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap-md); }
    .chart-card h3 { font-size: 14px; color: var(--text-secondary); margin-bottom: var(--gap-sm); font-weight: 500; letter-spacing: 0.3px; }
    .chart-card canvas { width: 100% !important; }
    .chart-card .chart-wrap { position: relative; width: 100%; }
    .chart-card.hero .chart-wrap { height: 380px; }
    .chart-card.half .chart-wrap { height: 300px; }
    .chart-card:not(.hero):not(.half) .chart-wrap { height: 320px; }
    @media (min-width: 1024px) {
      .chart-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-card.hero { grid-column: 1 / -1; }
    }
    .chart-empty { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 14px; }
    .chart-card canvas { cursor: pointer; }

    /* Model selector (Trends tab) — matches filter-btn style */
    .model-selector { display: flex; gap: var(--gap-sm); align-items: center; margin-bottom: var(--gap-md); flex-wrap: wrap; }
    .model-selector .sel-label { font-size: 12px; color: var(--text-tertiary); margin-right: 4px; }
    .model-selector .sel-btn { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .model-selector .sel-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .model-selector .sel-btn.active { background: var(--ui); color: #fff; border-color: var(--ui); }

    /* ============================================================
       TABLES — Conditional Formatting
       ============================================================ */
    .perf-table { width: 100%; min-width: 1100px; border-collapse: collapse; font-size: 12px; }

    .table-watermark-scroll::-webkit-scrollbar { height: 8px; }
    .table-watermark-scroll::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 4px; }
    .table-watermark-scroll::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 4px; }
    .table-watermark-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    .perf-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); color: var(--text-tertiary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; background: var(--bg-secondary); }
    .perf-table th.num { text-align: right; }
    .perf-table td { padding: 7px 10px; border-bottom: 1px solid var(--border-light); }
    .perf-table td.num { text-align: right; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
    .perf-table td.model-name { font-weight: 500; white-space: nowrap; }
    .perf-table th.sortable { cursor: pointer; user-select: none; }
    .perf-table th.sortable:hover { color: var(--text-secondary); }
    .perf-table th.sortable .sort-icon { font-size: 9px; opacity: 0.3; margin-left: 2px; }
    .perf-table th.sortable.sort-asc .sort-icon, .perf-table th.sortable.sort-desc .sort-icon { opacity: 1; color: var(--ui-bright); }
    .perf-table tbody tr[data-key] { cursor: pointer; transition: background 0.1s; }
    #tab-performance .perf-table tbody tr[data-key] td:first-child::before,
    #tab-data .perf-table tbody tr[data-key] td:first-child::before { content: '▸ '; color: var(--text-tertiary); font-size: 10px; }
    #tab-performance .perf-table tbody tr[data-key].row-open td:first-child::before,
    #tab-data .perf-table tbody tr[data-key].row-open td:first-child::before { content: '▾ '; }
    .perf-table tbody tr:nth-child(4n+1), .perf-table tbody tr:nth-child(4n+2) { background: var(--table-stripe, rgba(22,27,34,0.5)); }
    .perf-table tbody tr:hover { background: var(--bg-tertiary); }
    .perf-table tbody tr.regression { background: rgba(242,92,78,0.06) !important; }
    .perf-table tbody tr.regression td:first-child { border-left: 3px solid var(--accent-red); }
    .perf-table tbody tr.regression:hover { background: rgba(242,92,78,0.12) !important; }
    .perf-table tbody tr.regression-warning { background: rgba(237,160,106,0.06) !important; }
    .perf-table tbody tr.regression-warning td:first-child { border-left: 3px solid var(--accent-orange); }
    .perf-table tbody tr.regression-warning:hover { background: rgba(237,160,106,0.12) !important; }
    .perf-table .warn { color: var(--accent-red); }
    /* Data bar for throughput */
    .data-bar { position: relative; }
    .data-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 2px; pointer-events: none; }
    .data-bar-text { position: relative; z-index: 1; }


    /* Detail row (expandable) */
    .detail-row { display: none; }
    .detail-row.expanded { display: table-row; }
    .detail-row td { padding: 12px 16px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); }
    .detail-box { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-md); font-size: 12px; }
    .detail-box .detail-section h4 { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 6px; }
    .detail-box .detail-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--border-light); }
    .detail-box .detail-key { color: var(--text-tertiary); }
    .detail-box .detail-val { color: var(--text-primary); font-family: "SF Mono", monospace; }
    .action-row { display: flex; gap: var(--gap-sm); margin-top: var(--gap-md); flex-wrap: wrap; }
    .action-btn { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer; text-decoration: none; display: inline-block; }
    .action-btn:hover { background: var(--border); color: var(--text-primary); text-decoration: none; }

    /* ============================================================
       TIMELINE VIEW (Data & Trace tab)
       ============================================================ */
    .view-toggle { display: flex; gap: 0; }
    .view-toggle button { background: var(--bg-secondary); color: var(--text-tertiary); border: 1px solid var(--border); padding: 6px 14px; font-size: 12px; cursor: pointer; }
    .view-toggle button:first-child { border-radius: 6px 0 0 6px; }
    .view-toggle button:last-child { border-radius: 0 6px 6px 0; border-left: none; }
    .view-toggle button.active { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--text-tertiary); }
    .timeline { padding-left: 24px; border-left: 2px solid var(--border); }
    .tl-node { position: relative; padding: 0 0 var(--gap-lg) var(--gap-lg); }
    .tl-node::before { content: ''; position: absolute; left: -29px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: var(--ui); border: 2px solid var(--bg-primary); }
    .tl-node.has-regression::before { background: var(--accent-red); }
    .tl-header { display: flex; align-items: center; gap: var(--gap-sm); flex-wrap: wrap; }
    .tl-header .commit-id { font-family: "SF Mono", monospace; font-weight: 600; color: var(--text-primary); }
    .tl-header .date { color: var(--text-tertiary); font-size: 12px; }
    .tl-header .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
    .tl-header .badge.warn { background: rgba(242,92,78,0.15); color: var(--accent-red); border-color: var(--accent-red); }
    .tl-msg { color: var(--text-tertiary); font-size: 12px; margin-top: 4px; max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tl-details { margin-top: var(--gap-sm); display: none; }
    .tl-details.expanded { display: block; }
    .tl-toggle { background: none; border: none; color: var(--ui-bright); cursor: pointer; font-size: 12px; padding: 0; margin-top: 4px; }
    .tl-toggle:hover { text-decoration: underline; }

    /* ============================================================
       POPOVER
       ============================================================ */
    .popover-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; background: rgba(0,0,0,0.5); }
    .popover-overlay.open { display: flex; align-items: center; justify-content: center; }
    .popover { position: relative; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap-lg); padding-top: 40px; max-width: 520px; width: 90vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
    .popover h3 { color: var(--text-primary); font-size: 15px; margin-bottom: var(--gap-md); padding-bottom: var(--gap-sm); border-bottom: 1px solid var(--border); }
    .popover .pop-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    .popover .pop-key { color: var(--text-tertiary); }
    .popover .pop-val { color: var(--text-primary); font-family: "SF Mono", monospace; }
    .popover .pop-section { margin-top: var(--gap-md); padding-top: var(--gap-sm); border-top: 1px solid var(--border); }
    /* pop-actions uses shared action-row + action-btn */
    .pop-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-tertiary); font-size: 18px; cursor: pointer; }
    .hover-tooltip { display: none; position: fixed; z-index: 210; min-width: 220px; max-width: 320px; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 12px 32px rgba(0,0,0,0.35); pointer-events: none; }
    .hover-tooltip.open { display: block; }
    .hover-tooltip .hover-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; font-size: 12px; }
    .hover-tooltip .hover-key { color: var(--text-tertiary); white-space: nowrap; }
    .hover-tooltip .hover-val { color: var(--text-primary); text-align: right; overflow-wrap: anywhere; }
    .hover-tooltip .hover-val.num { font-family: "SF Mono", monospace; }
    .accuracy-score-cell { padding-top: 4px; padding-bottom: 4px; }
    .accuracy-score-trigger { background: none; border: none; padding: 0; font: inherit; font-weight: 700; color: var(--text-primary); cursor: pointer; text-decoration: underline dotted transparent; text-underline-offset: 3px; }
    .accuracy-score-trigger:hover, .accuracy-score-trigger:focus-visible { text-decoration-color: var(--text-tertiary); }

    /* ============================================================
       FOOTER
       ============================================================ */
    footer { margin-top: var(--gap-lg); padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-tertiary); flex-wrap: wrap; gap: var(--gap-sm); }
    footer button { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 11px; }
    footer button:hover { background: var(--bg-tertiary); }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 768px) {
      .kpi-row { flex-direction: column; gap: var(--gap-md); }
      .kpi-group + .kpi-group { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: var(--gap-md); }
      .kpi-card .kpi-value { font-size: 22px; }
      .kpi-card .kpi-sub { font-size: 10px; }
      .filter-bar { width: 100%; }
      .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .detail-box { grid-template-columns: 1fr; }
      .heatmap-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .model-selector { gap: 4px; }
      .model-selector .sel-btn { padding: 5px 8px; font-size: 11px; }
      header { padding: var(--gap-sm) var(--gap-md); }
      h1 { font-size: 16px; }
      .chart-card.hero .chart-wrap, .chart-card.half .chart-wrap { height: 260px; }
      .popover { max-width: 95vw; padding: var(--gap-md); padding-top: 36px; }
    }
    @media (max-width: 480px) {
      .kpi-group { grid-template-columns: 1fr; }
      .container { padding: var(--gap-sm); }
      header { padding: var(--gap-sm); }
      .filter-bar { gap: 4px; }
      .filter-btn, .filter-reset { padding: 5px 8px; font-size: 11px; }
      .tabs .tab { padding: 6px 10px; font-size: 12px; }
      .chart-card.hero .chart-wrap, .chart-card.half .chart-wrap, .chart-card .chart-wrap { height: 220px; }
      .perf-table { font-size: 11px; }
      .perf-table th, .perf-table td { padding: 5px 6px; }
      .heatmap-table th, .heatmap-table td { padding: 4px 6px; font-size: 10px; }
    }


    /* Stale data warning */
    .meta .stale { color: var(--accent-orange); }
    .perf-table tbody tr.stale-data td.model-name { opacity: 0.5; }

    /* Heatmap table */
    .heatmap-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: var(--gap-md); }
    .heatmap-table th { text-align: center; padding: 6px 10px; border-bottom: 2px solid var(--border); color: var(--text-tertiary); font-weight: 500; font-size: 11px; background: var(--bg-secondary); }
    .heatmap-table td { text-align: center; padding: 6px 10px; border: 1px solid var(--border-light); font-family: "SF Mono", monospace; font-size: 11px; color: var(--text-primary); }
    .heatmap-table td.row-label { text-align: left; font-family: inherit; color: var(--text-secondary); white-space: nowrap; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <a href="https://github.com/rocm/atom" target="_blank" rel="noopener noreferrer"><img class="header-logo" src="atom_logo.png" alt="ATOM" onerror="this.style.display='none'"></a>
    <div>
      <h1>Benchmark Dashboard</h1>
      <div class="meta"><span id="last-update"></span> · <a id="repo-link" target="_blank" rel="noopener noreferrer"></a></div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode"></button>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
</header>
<div class="header-spacer" id="header-spacer"></div>
<div class="fixed-thead" id="fixed-thead"></div>
<div class="container">
  <!-- Level 1: KPI Summary (always visible) -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Level 2-3: Tabs -->
  <div class="tabs" id="tabs-nav">
    <div class="tab active" data-tab="performance">Performance<span class="tab-badge hidden" id="tab-badge-perf"></span></div>
    <div class="tab" data-tab="tradeoff">Throughput vs Latency</div>
    <div class="tab" data-tab="trends">Trends</div>
    <div class="tab" data-tab="data">Data &amp; Trace</div>
    <div class="tab" data-tab="accuracy">Accuracy<span class="tab-badge hidden" id="tab-badge-acc"></span></div>
  </div>

  <div class="tab-content active" id="tab-performance"></div>
  <div class="tab-content" id="tab-tradeoff"></div>
  <div class="tab-content" id="tab-trends"></div>
  <div class="tab-content" id="tab-data"></div>
  <div class="tab-content" id="tab-accuracy"></div>

  <footer>
    <div>
      <button id="dl-btn">Download JSON</button>
    </div>
    <span>Powered by <a href="https://github.com/benchmark-action/github-action-benchmark" target="_blank" rel="noopener noreferrer">github-action-benchmark</a> · ATOM Inference Engine</span>
  </footer>
</div>

<!-- Popover -->
<div class="popover-overlay" id="popover-overlay"><div class="popover" id="popover"></div></div>
<div class="hover-tooltip" id="accuracy-hover-tooltip" aria-hidden="true"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha384-bs/nf9FbdNouRbMiFcrcZfLXYPKiPaGVGplVbv7dLGECccEXDW+S3zjqSKR5ZEaD" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js" integrity="sha384-y49Zu59jZHJL/PLKgZPv3k2WI9c0Yp3pWB76V8OBVCb0QBKS8l4Ff3YslzHVX76Y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script src="models_map.js"></script>
<script src="atomesh_summary.js"></script>
<script>
'use strict';
(function() {
/* ================================================================
   1. CONSTANTS & COLOR PALETTE
   ================================================================ */
// HSL-based palette: each model gets a distinct base hue; backend offsets keep
// ATOM, ATOM-vLLM, and ATOM-SGLang visually related but not identical.
const MODEL_HUES = {
  'DeepSeek-R1-0528':      210,   // blue
  'DeepSeek-R1-0528-mtp3': 175,   // cyan/teal — distinct from base DeepSeek
  'DeepSeek-R1-0528-MXFP4': 190,  // teal
  'GLM-5-FP8':             140,   // green
  'gpt-oss-120b':          15,    // orange
  'Kimi-K2-Thinking-MXFP4': 320,  // magenta
  'Meta-Llama-3-8B-Instruct': 270, // purple
  'Qwen3-235B-A22B-Instruct-2507-FP8': 50, // gold
};
const BACKEND_HUE_OFFSETS = {
  'ATOM': 0,
  'ATOM-vLLM': 28,
  'ATOM-SGLang': -30,
};
const FALLBACK_HUES = [45, 330, 190, 30]; // yellow, pink, teal, amber
let fallbackHueIdx = 0;
function getModelHue(backend, model) {
  const normalizedBackend = backend === 'OOT' ? 'ATOM-vLLM' : backend;
  const backendModelKey = normalizedBackend ? `${normalizedBackend}::${model}` : model;
  if (MODEL_HUES[backendModelKey] != null) return MODEL_HUES[backendModelKey];
  let baseHue = MODEL_HUES[model];
  if (baseHue == null) {
    baseHue = FALLBACK_HUES[fallbackHueIdx % FALLBACK_HUES.length];
    MODEL_HUES[model] = baseHue;
    fallbackHueIdx++;
  }
  const offset = BACKEND_HUE_OFFSETS[normalizedBackend] ?? 0;
  const derivedHue = normalizedBackend ? (baseHue + offset) % 360 : baseHue;
  if (normalizedBackend) MODEL_HUES[backendModelKey] = derivedHue;
  return derivedHue;
}
function getModelColor(backend, model) {
  const h = getModelHue(backend, model);
  const light = _theme === 'light';
  return {
    border: `hsl(${h}, ${light ? '50%' : '55%'}, ${light ? '45%' : '65%'})`,
    bg:     `hsla(${h}, ${light ? '50%' : '55%'}, ${light ? '45%' : '65%'}, ${light ? '0.08' : '0.12'})`,
    text:   `hsl(${h}, ${light ? '40%' : '35%'}, ${light ? '40%' : '75%'})`,
  };
}
// Bar color: lower saturation, higher lightness for a soft pastel look
function getBarColor(backend, model, conc, concList) {
  const h = getModelHue(backend, model);
  const sorted = [...concList].sort((a, b) => a - b);
  const rank = sorted.indexOf(conc);
  const alpha = concList.length <= 1 ? 0.55 : 0.3 + (rank / (sorted.length - 1)) * 0.35;
  return `hsla(${h}, ${_theme === 'light' ? '45%' : '50%'}, ${_theme === 'light' ? '55%' : '72%'}, ${alpha.toFixed(2)})`;
}

// Chart color constants (match CSS variables, updated on theme toggle)
const THEME_COLORS = {
  dark:  { tick: '#8a8da0', legend: '#b0b2c4', tooltipBg: '#141519', tooltipBd: '#303140', tooltipTitle: '#eef0f6', tooltipBody: '#bfc1d0', grid: 'rgba(65,67,85,0.4)' },
  light: { tick: '#5a5d70', legend: '#4a4d5e', tooltipBg: '#ffffff', tooltipBd: '#d0d3dc', tooltipTitle: '#1a1c24', tooltipBody: '#4a4d5e', grid: 'rgba(0,0,0,0.10)' }
};
let _theme = localStorage.getItem('atom-dash-theme') || 'dark';
let C_TICK = THEME_COLORS[_theme].tick;
let C_LEGEND = THEME_COLORS[_theme].legend;
let C_TOOLTIP_BG = THEME_COLORS[_theme].tooltipBg;
let C_TOOLTIP_BD = THEME_COLORS[_theme].tooltipBd;
let C_TOOLTIP_TITLE = THEME_COLORS[_theme].tooltipTitle;
let C_TOOLTIP_BODY = THEME_COLORS[_theme].tooltipBody;
let C_GRID = THEME_COLORS[_theme].grid;

// Apply saved theme on load
if (_theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

function applyTheme(theme) {
  _theme = theme;
  localStorage.setItem('atom-dash-theme', theme);
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const tc = THEME_COLORS[theme];
  C_TICK = tc.tick; C_LEGEND = tc.legend; C_TOOLTIP_BG = tc.tooltipBg;
  C_TOOLTIP_BD = tc.tooltipBd; C_TOOLTIP_TITLE = tc.tooltipTitle; C_TOOLTIP_BODY = tc.tooltipBody;
  C_GRID = tc.grid;
  Chart.defaults.color = C_TICK;
  // Re-render dashboard
  if (typeof renderAll === 'function') renderAll();
}
document.addEventListener('click', function(e) {
  if (e.target.id === 'theme-toggle') {
    applyTheme(_theme === 'dark' ? 'light' : 'dark');
  }
});
// Register datalabels globally but disable by default
if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
Chart.defaults.plugins.datalabels = { display: false };
Chart.defaults.color = C_TICK;
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
Chart.defaults.font.size = 11;

// Legend hover plugin: fade non-hovered datasets via canvas globalAlpha
Chart.register({
  id: 'legendFocus',
  beforeDatasetDraw(chart, args) {
    if (chart._legendFocusIndex == null) return;
    if (args.index !== chart._legendFocusIndex) {
      chart.ctx.save();
      chart.ctx.globalAlpha = 0.12;
    }
  },
  afterDatasetDraw(chart, args) {
    if (chart._legendFocusIndex == null) return;
    if (args.index !== chart._legendFocusIndex) {
      chart.ctx.restore();
    }
  }
});
Chart.defaults.plugins.legend.onHover = function(e, item, legend) {
  legend.chart._legendFocusIndex = item.datasetIndex;
  legend.chart.draw();
  if (e.native?.target) e.native.target.style.cursor = 'pointer';
};
Chart.defaults.plugins.legend.onLeave = function(e, item, legend) {
  legend.chart._legendFocusIndex = null;
  legend.chart.draw();
  if (e.native?.target) e.native.target.style.cursor = 'default';
};

// Watermark plugin: draw ATOM logo as faded background on all charts
const _watermarkImg = new Image();
_watermarkImg.src = document.querySelector('.header-logo')?.src || 'atom_logo.png';
Chart.register({
  id: 'watermark',
  beforeDraw(chart) {
    if (!_watermarkImg.complete || !_watermarkImg.naturalWidth) return;
    const { ctx, chartArea: area } = chart;
    if (!area) return;
    const maxW = (area.right - area.left) * 0.4;
    const scale = maxW / _watermarkImg.naturalWidth;
    const w = _watermarkImg.naturalWidth * scale;
    const h = _watermarkImg.naturalHeight * scale;
    const x = area.left + (area.right - area.left - w) / 2;
    const y = area.top + (area.bottom - area.top - h) / 2;
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.drawImage(_watermarkImg, x, y, w, h);
    ctx.restore();
  }
});

const REGRESSION_WARNING = 0.05;   // 5% → warning
const REGRESSION_CRITICAL = 0.10;  // 10% → critical

/* ================================================================
   2. DATA PARSING
   ================================================================ */
const rawData = window.BENCHMARK_DATA || {
  lastUpdate: Date.now(),
  repoUrl: 'https://github.com/ROCm/ATOM',
  entries: {},
};
const DASHBOARD_MODES = ['Aggregated', 'Disaggregated'];
const ATOMESH_DATA = {
  updatedAt: Date.UTC(2026, 6, 3, 7, 9, 0),
  backend: 'ATOMesh',
  hardware: 'MI355X',
  gpuCount: 16,
  rocmVersion: '7.2.4',
  dockerImage: 'rocm/atom-dev:nightly_202607030204',
  runUrl: window.ATOMESH_RUN_URL || '',
  summaryMarkdown: window.ATOMESH_SUMMARY_MARKDOWN || '',
};

function parseAtomeshNumber(value) {
  if (value == null) return null;
  const text = String(value).trim();
  if (!text || text === '--' || text === '—') return null;
  const parsed = Number(text.replace(/,/g, ''));
  return Number.isFinite(parsed) ? parsed : null;
}

function atomeshSummaryHeaderKey(header) {
  return String(header || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function parseAtomeshSummaryRows(markdown) {
  const lines = String(markdown || '').split(/\r?\n/).filter(line => line.trim().startsWith('|'));
  if (lines.length < 3) return [];
  const headers = lines[0].split('|').slice(1, -1).map(h => atomeshSummaryHeaderKey(h.trim()));
  return lines.slice(2).map((line, idx) => {
    const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
    const raw = {};
    headers.forEach((header, i) => { raw[header] = cells[i] || ''; });
    const [isl, osl] = String(raw.islosl || '').split('/');
    const totalTputPerGpu = parseAtomeshNumber(raw.totaltoksgpu);
    const outputTputPerGpu = parseAtomeshNumber(raw.outputtoksgpu);
    const interactivity = parseAtomeshNumber(raw.interactivity);
    return {
      id: `atomesh-summary-${idx}`,
      backend: ATOMESH_DATA.backend,
      hardware: ATOMESH_DATA.hardware.toLowerCase(),
      model: raw.model || 'unknown',
      topology: raw.topology || 'unknown',
      islOsl: raw.islosl || '--',
      isl: parseAtomeshNumber(isl),
      osl: parseAtomeshNumber(osl),
      concurrency: parseAtomeshNumber(raw.concurrency),
      interactivity,
      totalTput: parseAtomeshNumber(raw.totaltoks),
      inputTput: parseAtomeshNumber(raw.inputtoks),
      outputTput: parseAtomeshNumber(raw.outputtoks),
      totalTputPerGpu,
      inputTputPerGpu: parseAtomeshNumber(raw.inputtoksgpu),
      outputTputPerGpu,
      ttftMs: parseAtomeshNumber(raw.ttftms),
      tpotMs: parseAtomeshNumber(raw.tpotms),
      e2eMs: parseAtomeshNumber(raw.e2ems),
      gsm8k: parseAtomeshNumber(raw.gsm8k),
      gsm8kRaw: raw.gsm8k || '--',
      runUrl: ATOMESH_DATA.runUrl,
      status: Number.isFinite(interactivity) && Number.isFinite(totalTputPerGpu ?? outputTputPerGpu) ? 'completed' : 'incomplete',
    };
  }).filter(row => row.model !== 'unknown' || row.topology !== 'unknown');
}
const atomeshSummaryRows = parseAtomeshSummaryRows(ATOMESH_DATA.summaryMarkdown);

// Normalize legacy model names using HF-path->display mapping from models_map.js
const _displayMap = window.MODELS_DISPLAY_MAP || {};
const _displayEntries = Object.entries(_displayMap).sort((a, b) => b[0].length - a[0].length);
// Accuracy model name renames: unify legacy "MTP3" suffix to "MTP"
// TODO: Remove after old "MTP3" data ages out of dashboard history (~90 runs)
const _accuracyRenames = {
  'Qwen3.5-397B-A17B-FP8 MTP3': 'Qwen3.5-397B-A17B-FP8 MTP',
  'DeepSeek-R1-0528 MTP3': 'DeepSeek-R1-0528 MTP',
  'DeepSeek-R1-0528-MXFP4 MTP3': 'DeepSeek-R1-0528-MXFP4 MTP',
};
function normalizeModelName(name, accRename = false) {
  if (accRename && _accuracyRenames[name]) return _accuracyRenames[name];
  const lc = name.toLowerCase();
  for (const [key, display] of _displayEntries) {
    if (lc === key) return display;
  }
  return name;
}

function parseBenchName(name) {
  let backend = 'ATOM';
  let rawName = name;
  const backendMatch = name.match(/^([^:]+)::(.+)$/);
  if (backendMatch) {
    backend = backendMatch[1];
    rawName = backendMatch[2];
  }
  if (backend === 'OOT') backend = 'ATOM-vLLM';
  // Accuracy entries: "ModelName accuracy (GSM8K)" — (.+?) for multi-word model names
  let m = rawName.match(/^(.+?)\s+accuracy\s+\((\w+)\)$/);
  if (m) return { backend, model: normalizeModelName(m[1], true), metric: 'accuracy', unit: m[2], isAccuracy: true };
  // MTP acceptance: "ModelName MTP acceptance (%)"
  m = rawName.match(/^(.+?)\s+MTP acceptance\s+\((%)\)$/);
  if (m) return { backend, model: normalizeModelName(m[1], true), metric: 'MTP acceptance', unit: m[2] };
  // avg toks/fwd: "ModelName avg toks/fwd (tok/fwd)"
  m = rawName.match(/^(.+?)\s+avg toks\/fwd\s+\((.+)\)$/);
  if (m) return { backend, model: normalizeModelName(m[1], true), metric: 'avg toks/fwd', unit: m[2] };
  m = rawName.match(/^(.+?)\s+(\d+\/\d+)\s+c=(\d+)\s+(.+?)\s*\((.+)\)$/);
  if (m) return { backend, model: normalizeModelName(m[1]), islOsl: m[2], conc: +m[3], metric: m[4].trim(), unit: m[5] };
  m = rawName.match(/^(.+?)\s+(\d+\/\d+)\s+c=(\d+)\s+(_gpu_count|_tp)$/);
  if (m) return { backend, model: normalizeModelName(m[1]), islOsl: m[2], conc: +m[3], metric: m[4], unit: '' };
  return null;
}

// Parse all runs sorted by date descending
const allRuns = Object.values(rawData.entries).flat().sort((a, b) => b.date - a.date);

function hardwareFromGpuName(name) {
  const text = String(name || '').toLowerCase();
  if (text.includes('mi355') || text.includes('mi35x')) return 'mi355x';
  if (text.includes('mi325')) return 'mi325x';
  if (text.includes('mi308')) return 'mi308x';
  if (text.includes('mi300')) return 'mi300x';
  if (text.includes('mi250')) return 'mi250x';
  if (text.includes('mi210')) return 'mi210';
  return 'unknown';
}

function parseBenchExtra(extra) {
  const meta = { hardware: 'unknown' };
  if (!extra) return meta;
  const rm = extra.match(/Run:\s*(https:\/\/\S+)/);
  if (rm) meta.runUrl = rm[1];
  const gm = extra.match(/GPU:\s*([^|]+)/);
  if (gm) {
    meta.gpuName = gm[1].trim().replace(/\bAMD\b/gi, '').replace(/\bInstinct\b/gi, '').replace(/\s+/g, ' ').trim();
    meta.hardware = hardwareFromGpuName(meta.gpuName);
  }
  const vm = extra.match(/VRAM:\s*(\d+)GB/);
  if (vm) meta.gpuVramGb = +vm[1];
  const rcm = extra.match(/ROCm:\s*([\d.]+)/);
  if (rcm) meta.rocmVersion = rcm[1];
  const dm = extra.match(/Docker:\s*([^|]+)/);
  if (dm) meta.ootImageTag = dm[1].trim();
  return meta;
}

// For each run, parse benches into structured configs
function parseRunConfigs(run) {
  const configs = {}; // key: "backend|model|isl/osl|conc|hardware"
  const hardwareByBaseKey = {};
  for (const b of run.benches) {
    const p = parseBenchName(b.name);
    if (!p || p.isAccuracy || !p.islOsl || p.islOsl === '0/0') continue;
    const baseKey = `${p.backend}|${p.model}|${p.islOsl}|${p.conc}`;
    const meta = parseBenchExtra(b.extra);
    if (meta.hardware !== 'unknown') hardwareByBaseKey[baseKey] = meta.hardware;
  }
  for (const b of run.benches) {
    const p = parseBenchName(b.name);
    if (!p || p.isAccuracy || !p.islOsl || p.islOsl === '0/0') continue;
    const baseKey = `${p.backend}|${p.model}|${p.islOsl}|${p.conc}`;
    const meta = parseBenchExtra(b.extra);
    const hardware = meta.hardware !== 'unknown' ? meta.hardware : (hardwareByBaseKey[baseKey] || 'unknown');

function trendHTML(current, previous, inverse) {
  // inverse=true means lower is better (TPOT, TTFT)
  if (previous == null || current == null) return '<span class="trend-neutral">—</span>';
  const pct = ((current - previous) / previous * 100);
  const abs = Math.abs(pct).toFixed(1);
  if (Math.abs(pct) < 1) return `<span class="trend-neutral">${pct >= 0 ? '+' : ''}${abs}%</span>`;
  const isGood = inverse ? pct < 0 : pct > 0;
  const arrow = pct > 0 ? '▲' : '▼';
  const cls = isGood ? 'trend-up' : 'trend-down';
  return `<span class="${cls}">${arrow} ${abs}%</span>`;
}

// Non-regression trend: positive ≥5% gets green, negative stays muted
function neutralTrendHTML(current, previous) {
  if (previous == null || current == null) return '<span class="trend-neutral">—</span>';
  const pct = ((current - previous) / previous * 100);
  const abs = Math.abs(pct).toFixed(1);
  if (Math.abs(pct) < 1) return `<span class="trend-neutral">${pct >= 0 ? '+' : ''}${abs}%</span>`;
  const arrow = pct > 0 ? '▲' : '▼';
  if (pct >= 5) return `<span class="trend-up">${arrow} ${abs}%</span>`;
  return `<span class="trend-neutral">${arrow} ${abs}%</span>`;
}

  if (previous == null || current == null) return '<span class="trend-neutral">—</span>';
  const pct = ((current - previous) / previous * 100);
  const abs = Math.abs(pct).toFixed(1);
  const arrow = pct > 0 ? '▲' : '▼';
  const color = severity === 'critical' ? 'var(--accent-red)' : 'var(--accent-orange)';
  return `<span style="color:${color}">${arrow} ${abs}%</span>`;
}

// Heat color: ratio 0 (best) → 1 (worst), 3-color gradient: green → yellow → red
function heatBg(ratio) {
  const r = Math.min(1, Math.max(0, ratio));
  if (r < 0.33) return `rgba(86, 212, 114, ${(0.08 + r * 0.2).toFixed(2)})`;
  if (r < 0.67) return `rgba(221, 176, 64, ${(0.08 + (r - 0.33) * 0.2).toFixed(2)})`;
  return `rgba(242, 92, 78, ${(0.08 + (r - 0.67) * 0.3).toFixed(2)})`;
}

  // Sync horizontal scroll

      ctx.fillStyle = color || 'rgba(154,155,170,0.7)';
      ctx.font = '10px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(label || 'avg', chart.chartArea.right, y - 4);

  if (!_accuracyHoverTooltip) return;
  const rows = buildAccuracyPreviewRows(preview);
  _accuracyHoverTooltip.innerHTML = rows.map(r => `<div class="hover-row"><span class="hover-key">${escHTML(r.label)}</span><span class="hover-val ${r.label === 'Accuracy' ? 'num' : ''}">${escHTML(String(r.value))}</span></div>`).join('');
}
function positionAccuracyHoverTooltip(anchor) {
  if (!_accuracyHoverTooltip) return;
  const pad = 12;
  const rect = _accuracyHoverTooltip.getBoundingClientRect();
  let x = pad;
  let y = pad;
  if (anchor && typeof anchor.clientX === 'number' && typeof anchor.clientY === 'number') {
    x = anchor.clientX;
    y = anchor.clientY;
  } else if (anchor && anchor.getBoundingClientRect) {
    const targetRect = anchor.getBoundingClientRect();
    x = targetRect.left + targetRect.width / 2;
    y = targetRect.bottom;
  }
  let left = x + 14;
  let top = y + 14;
  if (left + rect.width + pad > window.innerWidth) left = x - rect.width - 14;
  if (top + rect.height + pad > window.innerHeight) top = y - rect.height - 14;
  _accuracyHoverTooltip.style.left = Math.max(pad, left) + 'px';
  _accuracyHoverTooltip.style.top = Math.max(pad, top) + 'px';
}
function showAccuracyHover(anchor, preview) {
  if (!_accuracyHoverTooltip) return;
  renderAccuracyHover(preview);
  _accuracyHoverTooltip.classList.add('open');
  _accuracyHoverTooltip.setAttribute('aria-hidden', 'false');
  positionAccuracyHoverTooltip(anchor);
}
function hideAccuracyHover() {
  if (!_accuracyHoverTooltip) return;
  _accuracyHoverTooltip.classList.remove('open');
  _accuracyHoverTooltip.setAttribute('aria-hidden', 'true');
}

/* ================================================================
   6. FILTERS
   ================================================================ */
const filterDefs = [
  { id: 'backends', label: 'Backend', options: allBackends },
  { id: 'models', label: 'Model', options: allModels },
  { id: 'islOsl', label: 'ISL/OSL', options: allIslOsl, format: fmtIslOsl },
  { id: 'conc', label: 'Concurrency', options: allConc.map(String) },
  { id: 'hardware', label: 'Hardware', options: allHardware, format: fmtHardware },
];

function getFilterState(id) {
  return id === 'conc' ? state.filters.conc.map(String) : state.filters[id];
}

function appendDashboardModeSelector(bar) {
  const group = document.createElement('div');
  group.className = 'filter-group dashboard-mode-group';
  group.innerHTML = `<button class="filter-btn" data-filter="dashboard-mode">${state.dashboardMode} ▾</button>
    <div class="filter-dropdown" id="fd-dashboard-mode">
      ${DASHBOARD_MODES.map(mode => `<label><input type="radio" name="dashboard-mode" value="${mode}" ${state.dashboardMode === mode ? 'checked' : ''}> ${mode}</label>`).join('')}
    </div>`;
  bar.appendChild(group);
}

function setDashboardMode(mode) {
  if (!DASHBOARD_MODES.includes(mode) || state.dashboardMode === mode) return;
  state.dashboardMode = mode;
  if (mode === 'Disaggregated' && !['performance', 'accuracy'].includes(state.activeTab)) {
    state.activeTab = 'performance';
  }
  renderFilters();
  updateHeaderGpuMeta();
  renderKPICards();
  renderActiveTab();
  syncToHash();
}

// Update only the button badge text — no DOM rebuild
function updateFilterBadge(id) {
  const btn = document.querySelector(`.filter-btn[data-filter="${id}"]`);
  if (!btn) return;
  const def = filterDefs.find(d => d.id === id);
  if (id === 'hardware') {
    btn.innerHTML = `${fmtHardware(selectedHardware())} ▾`;
    return;
  }
  const sel = getFilterState(id);
  const allSelected = sel.length === def.options.length;
  btn.innerHTML = allSelected ? `${def.label} ▾` : `${def.label} ▾<span class="count">${sel.length}</span>`;
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  appendDashboardModeSelector(bar);
  for (const d of filterDefs) {
    const sel = getFilterState(d.id);
    const allSelected = sel.length === d.options.length;
    const group = document.createElement('div');
    group.className = 'filter-group';
    if (d.id === 'hardware') {
      const selected = selectedHardware();
      group.innerHTML = `<button class="filter-btn" data-filter="${d.id}">${fmtHardware(selected)} ▾</button>
        <div class="filter-dropdown" id="fd-${d.id}">
          ${d.options.map(o => `<label><input type="radio" name="hardware-filter" value="${o}" ${selected === o ? 'checked' : ''}> ${d.format ? d.format(o) : o}</label>`).join('')}
        </div>`;
    } else {
      group.innerHTML = `<button class="filter-btn" data-filter="${d.id}">${d.label} ▾${allSelected ? '' : '<span class="count">' + sel.length + '</span>'}</button>
        <div class="filter-dropdown" id="fd-${d.id}">
          <label><input type="checkbox" value="__all__" ${allSelected ? 'checked' : ''}> All</label>
          <div class="sep"></div>
          ${d.options.map(o => `<label><input type="checkbox" value="${o}" ${sel.includes(o) ? 'checked' : ''}> ${d.format ? d.format(o) : o}</label>`).join('')}
        </div>`;
    }
    bar.appendChild(group);
  }
  // Filter summary
  const allSelected = filterDefs.every(d => getFilterState(d.id).length === d.options.length);
  const summaryEl = document.createElement('span');
  summaryEl.className = 'filter-summary';
  if (state.dashboardMode === 'Disaggregated') {
    const rows = filteredAtomeshRows();
    const completed = rows.filter(row => row.status === 'completed').length;
    summaryEl.textContent = `${completed}/${rows.length} ATOMesh rows`;
  } else if (allSelected) {
    summaryEl.textContent = 'Showing all';
  } else {
    const fc = filteredConfigs();
    const count = Object.keys(fc).length;
    summaryEl.textContent = `${count} configs`;
  }
  bar.appendChild(summaryEl);

  // Reset button
  const resetBtn = document.createElement('button');
  resetBtn.className = 'filter-reset';
  resetBtn.textContent = 'Reset';
  resetBtn.addEventListener('click', () => {
    state.filters.backends = [...allBackends];
    state.filters.models = [...allModels];
    state.filters.islOsl = [...allIslOsl];
    state.filters.conc = [...allConc];
    state.filters.hardware = [defaultHardware];
    renderFilters();
    updateHeaderGpuMeta();
    renderActiveTab();
    renderKPICards();
    syncToHash();
  });
  bar.appendChild(resetBtn);

  // Copy Link button
  const copyLinkBtn = document.createElement('button');
  copyLinkBtn.className = 'filter-reset';
  copyLinkBtn.textContent = 'Copy Link';
  copyLinkBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => {
      copyLinkBtn.textContent = 'Copied!';
      setTimeout(() => { copyLinkBtn.textContent = 'Copy Link'; }, 1500);
    });
  });
  bar.appendChild(copyLinkBtn);

  bindFilterDropdownEvents(bar);
}

function bindFilterDropdownEvents(bar) {
  // Event: toggle dropdown (stopPropagation keeps it open)
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const dd = document.getElementById('fd-' + btn.dataset.filter);
      const wasOpen = dd.classList.contains('open');
      closeAllDropdowns();
      if (!wasOpen) { dd.classList.add('open'); btn.classList.add('open'); }
    });
  });

  // Event: clicks inside dropdown must NOT close it
  bar.querySelectorAll('.filter-dropdown').forEach(dd => {
    dd.addEventListener('click', (e) => e.stopPropagation());
  });

  // Event: checkbox change — update state & badge in-place, no DOM rebuild
  bar.querySelectorAll('.filter-dropdown').forEach(dd => {
    dd.addEventListener('change', (e) => {
      const filterId = dd.id.replace('fd-', '');
      if (filterId === 'dashboard-mode') {
        if (e.target.type === 'radio') setDashboardMode(e.target.value);
        return;
      }
      if (filterId === 'hardware') {
        if (e.target.type !== 'radio') return;
        state.filters.hardware = [e.target.value];
        updateFilterBadge('hardware');
        updateHeaderGpuMeta();
        renderActiveTab();
        renderKPICards();
        syncToHash();
        return;
      }
      const allCb = dd.querySelector('input[value="__all__"]');
      const itemCbs = [...dd.querySelectorAll('input:not([value="__all__"])')];
      if (e.target.value === '__all__') {
        itemCbs.forEach(cb => cb.checked = e.target.checked);
      } else {
        allCb.checked = itemCbs.every(cb => cb.checked);
      }
      const selected = itemCbs.filter(cb => cb.checked).map(cb => cb.value);
      if (filterId === 'conc') {
        state.filters.conc = selected.map(Number);
      } else {
        state.filters[filterId] = selected;
      }
      updateFilterBadge(filterId);
      updateHeaderGpuMeta();
      renderActiveTab();
      renderKPICards();
      syncToHash();
    });
  });
}

function closeAllDropdowns() {
  document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('open'));
}
// Close dropdowns on outside click
document.addEventListener('click', closeAllDropdowns);

   7. KPI CARDS
   ================================================================ */
function updateDashboardTabs() {
  const allowedTabs = state.dashboardMode === 'Disaggregated'
    ? ['performance', 'accuracy']
    : ['performance', 'tradeoff', 'trends', 'data', 'accuracy'];
  if (!allowedTabs.includes(state.activeTab)) state.activeTab = 'performance';
  document.querySelectorAll('#tabs-nav .tab').forEach(tab => {
    const tabName = tab.dataset.tab;
    tab.style.display = allowedTabs.includes(tabName) ? '' : 'none';
    if (tabName === 'performance' && tab.firstChild) {
      tab.firstChild.nodeValue = state.dashboardMode === 'Disaggregated'
        ? 'Token Throughput per GPU vs. Interactivity'
        : 'Performance';
    }
  });
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.activeTab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + state.activeTab));
}

function renderKPICards() {
  updateDashboardTabs();
  if (state.dashboardMode === 'Disaggregated') {
    renderAtomeshKPICards();
    return;
  }
  const fc = filteredConfigs();
  const entries = Object.entries(fc);
  const row = document.getElementById('kpi-row');

  // Find peak total throughput
  let peakTput = null, peakTputCfg = null, peakTputPrev = null;
  let bestTpot = null, bestTpotCfg = null, bestTpotPrev = null;
  for (const [key, cfg] of entries) {
    const totalTput = cfg['Total Tput'];
    if (totalTput != null && (peakTput === null || totalTput > peakTput)) {
      peakTput = totalTput; peakTputCfg = cfg;
      const hist = historyMap[key]; peakTputPrev = (hist && hist.length > 1) ? hist[1]['Total Tput'] : null;
    }
    if (cfg.TPOT != null && (bestTpot === null || cfg.TPOT < bestTpot)) {
      bestTpot = cfg.TPOT; bestTpotCfg = cfg;
      const hist = historyMap[key]; bestTpotPrev = (hist && hist.length > 1) ? hist[1].TPOT : null;
    }
  }

  const models = new Set(entries.map(([, c]) => c.model));
  const backends = new Set(entries.map(([, c]) => c.backend));
  const gpuCounts = [...new Set(entries.map(([, c]) => c._gpu_count || c._tp).filter(Boolean))].sort((a, b) => a - b);
  const gpuLabel = gpuCounts.length === 1 ? gpuCounts[0] + '× GPU' : gpuCounts.length > 1 ? gpuCounts[0] + '-' + gpuCounts[gpuCounts.length - 1] + '× GPU' : '';

  // GPU platform info from latest configs
  const gpuNames = [...new Set(entries.map(([, c]) => c._gpu_name).filter(Boolean))];
  const gpuVrams = [...new Set(entries.map(([, c]) => c._gpu_vram_gb).filter(Boolean))];
  const rocmVersions = [...new Set(entries.map(([, c]) => c._rocm_version).filter(Boolean))];
  const gpuNameLabel = gpuNames.length === 1 ? gpuNames[0] : gpuNames.length > 1 ? gpuNames.join(', ') : '';
  const gpuVramLabel = gpuVrams.length === 1 ? gpuVrams[0] + 'GB' : '';
  const rocmLabel = rocmVersions.length === 1 ? 'ROCm ' + rocmVersions[0] : '';

  // Regression counts by severity
  const filteredRegKeys = Object.keys(regressions).filter(k => {
    const c = latestConfigs[k];
    return c && state.filters.backends.includes(c.backend) &&
      state.filters.models.includes(c.model) &&
      state.filters.islOsl.includes(c.islOsl) && state.filters.conc.includes(c.conc) &&
      state.filters.hardware.includes(c.hardware || 'unknown');
  });
  const regCount = filteredRegKeys.length;
  const criticalCount = filteredRegKeys.filter(k => regressions[k].severity === 'critical').length;
  const warningCount = regCount - criticalCount;
  const regCardClass = regCount > 0 ? (criticalCount > 0 ? 'alert clickable' : 'alert-warning clickable') : 'ok';

  // Build GPU sub-label
  const gpuParts = [entries.length + ' configs', backends.size + ' modes'];
  if (gpuLabel) gpuParts.push(gpuLabel);
  if (gpuNameLabel) gpuParts.push(gpuNameLabel);
  if (gpuVramLabel) gpuParts.push(gpuVramLabel);
  if (rocmLabel) gpuParts.push(rocmLabel);

  // Regression sub-label
  let regSub;
  if (regCount === 0) {
    regSub = 'No regressions detected';
  } else if (criticalCount > 0 && warningCount > 0) {
    regSub = `${criticalCount} critical, ${warningCount} warning`;
  } else if (criticalCount > 0) {
    regSub = `${criticalCount} critical`;
  } else {
    regSub = `${warningCount} warning`;
  }

  // Accuracy KPI — health-based status (not regression-based); respect backend/model filters
  const accEntries = filteredAccuracyEntries();
  const failCount = accEntries.filter(([, a]) => a.threshold && (a.score < 0.1 || a.score < a.threshold)).length;
  const atRiskCount = accEntries.filter(([, a]) => a.threshold && a.score >= 0.1 && a.score >= a.threshold && (a.score - a.threshold) < 0.005).length;
  const healthyCount = accEntries.filter(([, a]) => a.threshold && a.score >= 0.1 && a.score >= a.threshold && (a.score - a.threshold) >= 0.005).length;
  const accCardClass = failCount > 0 ? 'alert clickable' : atRiskCount > 0 ? 'alert-warning clickable' : (accEntries.length > 0 ? 'ok clickable' : 'clickable');
  const accSub = accEntries.length === 0 ? 'No accuracy data'
    : failCount > 0 ? `${failCount} failed` + (atRiskCount > 0 ? ` · ${atRiskCount} at risk` : '')
    : atRiskCount > 0 ? `${healthyCount} healthy · ${atRiskCount} at risk`
    : 'All healthy';

  // Find worst regression model name for story annotation
  let worstRegModel = '';
  if (criticalCount > 0) {
    const worstKey = filteredRegKeys.find(k => regressions[k].severity === 'critical');
    if (worstKey) worstRegModel = latestConfigs[worstKey]?.model || '';
  } else if (warningCount > 0) {
    worstRegModel = latestConfigs[filteredRegKeys[0]]?.model || '';
  }

  row.innerHTML = `
    <div class="kpi-group">
      <div class="kpi-card">
        <div class="kpi-label">Peak Total Throughput</div>
        <div class="kpi-value">${peakTput != null ? fmtCompact(peakTput, 0) : '—'} <span class="kpi-unit">tok/s</span></div>
        <div class="kpi-trend">${trendHTML(peakTput, peakTputPrev, false)}</div>
        <div class="kpi-sub">${peakTputCfg ? peakTputCfg.model + ' ' + fmtIslOsl(peakTputCfg.islOsl) + ' c=' + peakTputCfg.conc : ''}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Best TPOT (Lowest)</div>
        <div class="kpi-value">${bestTpot != null ? fmtNum(bestTpot, 2) : '—'} <span class="kpi-unit">ms</span></div>
        <div class="kpi-trend">${trendHTML(bestTpot, bestTpotPrev, true)}</div>
        <div class="kpi-sub">${bestTpotCfg ? bestTpotCfg.model + ' ' + fmtIslOsl(bestTpotCfg.islOsl) + ' c=' + bestTpotCfg.conc : ''}</div>
      </div>
    </div>
    <div class="kpi-group">
      <div class="kpi-card">
        <div class="kpi-label">Test Matrix</div>
        <div class="kpi-value">${models.size} <span class="kpi-unit">models</span></div>
        <div class="kpi-sub">${gpuParts.join(' · ')}</div>
      </div>
      <div class="kpi-card ${regCardClass}" id="kpi-reg" ${regCount > 0 ? 'title="Click to view regressions"' : ''}>
        <div class="kpi-label">Regressions</div>
        <div class="kpi-value">${regCount > 0 ? regCount : '0'} <span class="kpi-unit">${regCount > 0 ? '⚠' : '✓'}</span></div>
        <div class="kpi-sub">${regSub}${worstRegModel ? ' · ' + worstRegModel : ''}</div>
      </div>
      <div class="kpi-card ${accCardClass}" id="kpi-acc" title="Click to view accuracy">
        <div class="kpi-label">Accuracy</div>
        <div class="kpi-value">${accEntries.length > 0 ? healthyCount + '/' + accEntries.length : '—'} <span class="kpi-unit">${failCount > 0 ? '⚠' : accEntries.length > 0 ? '✓' : ''}</span></div>
        <div class="kpi-sub">${accSub}</div>
      </div>
    </div>`;

  // Regression card click → switch to Performance tab, scroll to first regression, flash highlight
  const regCard = document.getElementById('kpi-reg');
  if (regCard && regCount > 0) {
    regCard.addEventListener('click', () => {
      if (state.activeTab !== 'performance') {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'performance'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-performance'));
        state.activeTab = 'performance';
        renderActiveTab();
        syncToHash();
      }
      requestAnimationFrame(() => {
        const rows = document.querySelectorAll('#tab-performance tr.regression');
        if (rows.length) {
          rows[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
          rows.forEach(r => { r.classList.add('flash'); setTimeout(() => r.classList.remove('flash'), 1500); });
        }
      });
    });
  }

  // Accuracy card click → switch to Accuracy tab
  const accCard = document.getElementById('kpi-acc');
  if (accCard) {
    accCard.addEventListener('click', () => {
      if (state.activeTab !== 'accuracy') {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'accuracy'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-accuracy'));
        state.activeTab = 'accuracy';
        renderActiveTab();
        syncToHash();
      }
    });
  }

  // Tab badges — show count + tooltip
  const perfBadge = document.getElementById('tab-badge-perf');
  if (perfBadge) {
    if (regCount > 0) {
      perfBadge.className = 'tab-badge ' + (criticalCount > 0 ? 'alert' : 'warn');
      perfBadge.textContent = regCount;
      perfBadge.title = regSub;
    } else {
      perfBadge.className = 'tab-badge hidden';
    }
  }
  const accBadge = document.getElementById('tab-badge-acc');
  if (accBadge) {
    if (failCount > 0) {
      accBadge.className = 'tab-badge alert';
      accBadge.textContent = failCount;
      accBadge.title = failCount + ' model(s) below threshold';
    } else {
      accBadge.className = 'tab-badge hidden';
    }
  }
}

document.getElementById('tabs-nav').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
